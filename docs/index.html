      return `Recordatorio · ${baseZone().label} ${fmtSlot(start)}–${fmtSlot(end)}`;
    }

    function calendarDetails() {
      return selectionLines().join("\n");
    }

    function openGoogleCalendar() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const url = new URL("https://calendar.google.com/calendar/render");
      url.searchParams.set("action", "TEMPLATE");
      url.searchParams.set("text", calendarTitle());
      url.searchParams.set("dates", `${googleDate(start)}/${googleDate(end)}`);
      url.searchParams.set("details", calendarDetails());
      url.searchParams.set("ctz", baseZone().timeZone);
      window.open(url.toString(), "_blank", "noopener,noreferrer");
      showToast("Abriendo Google Calendar.");
    }

    function escapeICS(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\n/g, "\\n");
    }

    function downloadICS() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const stamp = new Date();
      const uid = `${Date.now()}-${Math.random().toString(36).slice(2)}@glass-time`;
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Glass Time//Visual Timezone Converter//ES",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${googleDate(stamp)}`,
        `DTSTART:${googleDate(start)}`,
        `DTEND:${googleDate(end)}`,
        `SUMMARY:${escapeICS(calendarTitle())}`,
        `DESCRIPTION:${escapeICS(calendarDetails())}`,
        "BEGIN:VALARM",
        "ACTION:DISPLAY",
        "DESCRIPTION:Recordatorio",
        "TRIGGER:-PT15M",
        "END:VALARM",
        "END:VEVENT",
        "END:VCALENDAR"
      ].join("\r\n");

      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `glass-time-${state.dateISO}-${pad(slotHour(normalizedRange().start))}${pad(slotMinute(normalizedRange().start))}.ics`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Archivo .ics creado para Calendario/Outlook/Apple.");
    }

    function copySelection() {
      const text = selectionLines().join("\n");
      navigator.clipboard?.writeText(text).then(
        () => showToast("Hora copiada."),
        () => showToast(text)
      );
    }

    /* ===== ui/cursor-controller.js ===== */

    /* Glass Time — ui/cursor-controller
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- cursor controller (class-only updates) ---------- */

    function updateCursorDOM(slot) {
      state.cursorSlot = clampSlot(slot);
      const hour = slotHour(state.cursorSlot);
      document.querySelectorAll(".cell.cursor").forEach(el => el.classList.remove("cursor"));
      document.querySelectorAll(`.cell[data-hour="${hour}"]`).forEach(el => el.classList.add("cursor"));
    }

    /* ===== ui/timeline-renderer.js ===== */

    /* Glass Time — ui/timeline-renderer
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timeline renderer ----------
       Full render is only used on STRUCTURAL changes (zones, date, base).
       Pointer interactions never call this — they patch the DOM directly. */

    function render() {
      const keepScroll = els.timeScroll ? els.timeScroll.scrollLeft : 0;
      els.dateInput.value = state.dateISO;
      renderRows();
      renderIsland();
      save();
      bindScrollSync();
      restoreScroll(keepScroll);
      updateDayPins();
    }

    /* Base-relative hour of the current instant (may land on the rendered
       yesterday/tomorrow), or null when outside the 3-day window. */
    function nowHourInView() {
      const baseNow = getParts(new Date(), baseZone().timeZone);
      const todayISO = `${baseNow.year}-${pad(baseNow.month)}-${pad(baseNow.day)}`;
      const dayDiff = Math.round((dateFromISO(todayISO) - dateFromISO(state.dateISO)) / 86400000);
      const h = dayDiff * 24 + baseNow.hour;
      return h >= VIEW_H0 && h < VIEW_H1 ? h : null;
    }

    /* Keep the app feeling alive between full renders: tick each city's "Ahora"
       time and move the live "now" marker. Text/class only — no rebuild. */
    function updateLiveClock() {
      const now = new Date();

      state.zones.forEach(zone => {
        const row = els.rows.querySelector(`.row[data-zone-id="${zone.id}"]`);
        if (!row) return;
        const cur = getParts(now, zone.timeZone);
        const ct = row.querySelector(".current-time");
        if (ct) ct.textContent = `Ahora · ${fmtDisplayTime(cur.hour, cur.minute)}`;
      });

      els.rows.querySelectorAll(".cell.now").forEach(c => c.classList.remove("now"));
      const nh = nowHourInView();
      if (nh !== null) {
        els.rows.querySelectorAll(`.cell[data-hour="${nh}"]`).forEach(c => c.classList.add("now"));
      }
    }

    /* Keep each scroller's day label pinned to the left edge and showing the date of
       the leftmost visible hour — so it follows the lateral scroll and flips exactly
       when you cross a midnight boundary. All scrollers share the same scrollLeft. */
    function updateDayPins(left) {
      const cw = cellWidthPx();
      const L = typeof left === "number" ? left : (els.timeScroll ? els.timeScroll.scrollLeft : 0);
      const idx = Math.max(0, Math.min(VIEW_HOURS - 1, Math.floor(L / cw + 0.001)));
      const h = idx + VIEW_H0; // rendered index -> base-relative hour
      const xform = `translateX(${L}px)`;
      document.querySelectorAll(".hours > .day-pin").forEach(pin => {
        const hoursEl = pin.parentElement;
        const ref = hoursEl.querySelector(`[data-hour="${h}"]`);
        const label = ref ? ref.getAttribute("data-date") || "" : "";
        if (pin.textContent !== label) {
          pin.textContent = label;
          pin.classList.remove("flip");
          void pin.offsetWidth; // restart the flash animation
          pin.classList.add("flip");
        }
        pin.style.transform = xform;
      });
    }

    function restoreScroll(left) {
      els.timeScroll.scrollLeft = left;
    }

    /* A cell is part of the selection if the range overlaps its 2 half-hour slots.
       The visual fill is drawn by the floating .sel-band; this flag only drives the
       per-cell text emphasis. */
    function cellSelected(h, range) {
      return h * 2 < range.end && h * 2 + 2 > range.start;
    }

    function renderRows() {
      const base = baseZone();
      const now = new Date();
      const range = normalizedRange();
      const nowHour = nowHourInView();

      els.rows.innerHTML = state.zones.map((zone, index) => {
        const current = getParts(now, zone.timeZone);
        const offset = offsetText(now, zone.timeZone);
        const color = COLORS[index % COLORS.length];

        let prevISO = null;
        const cells = Array.from({ length: VIEW_HOURS }, (_, i) => {
          const h = i + VIEW_H0; // base-relative hour across the 3-day window
          const instant = zonedTimeToUtc(state.dateISO, h, 0, base.timeZone);
          const p = getParts(instant, zone.timeZone);
          const localISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
          const dayShift = localISO < state.dateISO ? "-1" : localISO > state.dateISO ? "+1" : "";
          // Midnight divider where the local day changes; the scroll-following pin
          // shows the date persistently and updates at this boundary.
          const dayStart = h !== VIEW_H0 && localISO !== prevISO;
          prevISO = localISO;
          const dateLabel = `${fmtDate(p)}${dayShift ? ` · ${dayShift}` : ""}`;
          const selected = cellSelected(h, range);
          const phase = zonePhaseAt(zone, instant); // real sun: day / golden / twilight / night
          const otherDay = dayShift === "-1" ? "prev-day" : dayShift === "+1" ? "next-day" : "";
          const nowClass = h === nowHour ? "now" : "";
          const cursor = h === slotHour(state.cursorSlot);

          return `
            <div class="cell ${selected ? "selected" : ""} ${cursor ? "cursor" : ""} sun-${phase} ${otherDay} ${dayStart ? "day-start" : ""} ${nowClass}"
              data-hour="${h}"
              data-date="${escapeHTML(dateLabel)}"
              title="${escapeHTML(zone.label)}: ${fmtDate(p)} ${fmtDisplayTime(p.hour)}">
              <span class="cursor-band" aria-hidden="true"></span>
              <span class="t">${compactHourHTML(p.hour)}</span>
            </div>
          `;
        }).join("");

        return `
          <div class="row" data-zone-id="${zone.id}">
            <div class="city-card ${index === 0 ? "anchor" : ""}" data-action="edit-zone" style="--zone-color:${color}">
              <div class="city-glow" style="background:linear-gradient(180deg, ${color}, rgba(255,255,255,.65))"></div>
              <div class="city-main">
                <div class="city-line">
                  <div class="city-name">${escapeHTML(zone.label)}</div>
                  ${index === 0 ? `<span class="base-tag">Base</span>` : ""}
                  ${index > 0 ? `<span class="rel-offset" title="Diferencia con ${escapeHTML(base.label)}">${relOffsetText(now, zone.timeZone, base.timeZone)}</span>` : ""}
                  <div class="offset">${offset}</div>
                </div>
                <div class="current-time">Ahora · ${fmtDisplayTime(current.hour, current.minute)}</div>
                <div class="zone-name">${escapeHTML(zoneSubtitle(zone.timeZone, zone.label))}</div>
              </div>
              <div class="city-actions">
                ${index > 0 ? `<button class="mini-btn make-base" title="Hacer base">⌖</button>` : ""}
                ${state.zones.length > 1 ? `<button class="mini-btn remove-zone" title="Eliminar">×</button>` : ""}
              </div>
            </div>
            <div class="hours" style="--sel-start:${range.start - VIEW_SLOT0}; --sel-len:${range.durationSlots};">
              ${cells}
              <div class="sel-band" aria-hidden="true"></div>
              <div class="day-pin" aria-hidden="true"></div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderIsland() {
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      const base = baseZone();
      const baseStart = getParts(startInstant, base.timeZone);
      const baseEnd = getParts(endInstant, base.timeZone);
      const { durationSlots } = normalizedRange();
      const duration = durationText(durationSlots);
      const baseRange = `${fmtDisplayTime(baseStart.hour, baseStart.minute)}–${fmtDisplayTime(baseEnd.hour, baseEnd.minute)}`;

      els.selectedSummary.textContent = `${duration} seleccionadas`;
      els.selectedDateChip.textContent = `${base.label} · ${fmtDate(baseStart)} · ${baseRange}`;
      updateMood(startInstant);
    }

    /* Ambient mood: tint the whole scene by the sun phase at the base city for the
       selected time — warm at golden hour, deep at night. Updates live while dragging. */
    function updateMood(instant) {
      document.body.dataset.mood = zonePhaseAt(baseZone(), instant || selectedInstant());
    }

    /* Patch selection styling on the existing DOM — no rebuild, no scroll loss.
       The floating .sel-band glides via a CSS transition when these vars change. */
    function applySelectionDOM() {
      const range = normalizedRange();
      els.rows.querySelectorAll(".hours").forEach(hours => {
        hours.style.setProperty("--sel-start", range.start - VIEW_SLOT0);
        hours.style.setProperty("--sel-len", range.durationSlots);
      });
      for (let h = VIEW_H0; h < VIEW_H1; h++) {
        const selected = cellSelected(h, range);
        els.rows.querySelectorAll(`.cell[data-hour="${h}"]`).forEach(cell => {
          cell.classList.toggle("selected", selected);
        });
      }
    }

    /* Shift the 3-day window by N days keeping the on-screen content (and the
       absolute selection) exactly where it is. This is what makes lateral scroll
       effectively infinite: when you settle on yesterday/tomorrow, that day
       becomes the new base date and a fresh day appears beyond it. */
    function shiftWindow(shiftDays) {
      if (!shiftDays) return;
      state.dateISO = addDays(state.dateISO, shiftDays);
      state.selectedStartSlot -= shiftDays * 48;
      state.selectedEndSlot -= shiftDays * 48;
      state.cursorSlot -= shiftDays * 48;
      const keep = els.timeScroll.scrollLeft - shiftDays * 24 * cellWidthPx();
      render();
      els.timeScroll.scrollLeft = Math.max(0, keep);
      updateDayPins();
    }

    /* After the scroll settles, if the view center has left the middle day,
       re-anchor the window around the day being looked at. */
    function maybeShiftWindow() {
      if (drag.active || rowDrag.active) return;
      const cw = cellWidthPx();
      const sc = els.timeScroll;
      const visibleHours = (sc.clientWidth - parseFloat(getComputedStyle(document.documentElement).getPropertyValue("--city"))) / cw;
      const center = sc.scrollLeft / cw + Math.max(1, visibleHours) / 2; // rendered-hour units
      if (center < 24) shiftWindow(-1);
      else if (center >= 48) shiftWindow(1);
    }

    /* Single native scroller — no JS row-syncing at all. Day pins update once per
       frame; the window re-anchors shortly after the scroll goes idle. */
    function bindScrollSync() {
      let pinRAF = 0;
      let idleTimer = 0;
      els.timeScroll.onscroll = () => {
        if (!pinRAF) {
          pinRAF = requestAnimationFrame(() => { pinRAF = 0; updateDayPins(); });
        }
        clearTimeout(idleTimer);
        idleTimer = setTimeout(maybeShiftWindow, 220);
      };
    }

    /* Re-anchor the base date to the selection (canonical form) after the user
       commits a selection outside the middle day. Keeps the view visually still. */
    function applyCanonical() {
      const shift = canonicalizeSelection();
      if (shift) {
        const keep = els.timeScroll.scrollLeft - shift * 24 * cellWidthPx();
        render();
        els.timeScroll.scrollLeft = Math.max(0, keep);
        updateDayPins();
      }
      return shift;
    }

    function focusHour() {
      const target = Math.max(0, (slotHour(normalizedRange().start) - VIEW_H0) * cellWidthPx() - 180);
      els.timeScroll.scrollTo({ left: target, behavior: "smooth" });
    }

    /* ===== ui/range-selection.js ===== */

    /* Glass Time — ui/range-selection
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- range selection (pointer interactions) ---------- */

    const DRAG_THRESHOLD = 5;   // mouse/pen: px before a drag becomes a selection
    const TOUCH_HOLD_MS = 200;  // touch: hold this long (still) to enter selection mode
    const TOUCH_MOVE_TOL = 10;  // touch: movement beyond this before the hold = a scroll

    const drag = {
      active: false,
      selecting: false,
      anchor: 0,
      startX: 0,
      startY: 0,
      pointerType: "",
      pointerId: null,
      hoursEl: null,
      captureTarget: null,
      holdTimer: null
    };

    /* Map an absolute clientX to a half-hour slot using a row's .hours rect,
       so it stays correct regardless of horizontal scroll position. The rect spans
       the whole 3-day window, so the result is a base-relative slot. */
    function slotFromClientX(clientX, hoursEl) {
      const rect = hoursEl.getBoundingClientRect();
      const cw = rect.width / VIEW_HOURS;
      const rel = clientX - rect.left;
      let idx = Math.floor(rel / cw);
      idx = Math.max(0, Math.min(VIEW_HOURS - 1, idx));
      const within = (rel - idx * cw) / cw;
      return clampSlot((idx + VIEW_H0) * 2 + (within >= 0.5 ? 1 : 0));
    }

    /* Apply a range to state + DOM without a full render. */
    function liveRange(anchorSlot, currentSlot) {
      const a = clampSlot(anchorSlot);
      const b = clampSlot(currentSlot);
      const start = Math.min(a, b);
      const end = Math.min(VIEW_SLOT1, Math.max(a, b) + 1);
      state.selectedStartSlot = start;
      state.selectedEndSlot = end;
      applySelectionDOM();
      updateCursorDOM(b);
      renderIsland();
    }

    function clearHold() {
      if (drag.holdTimer) {
        clearTimeout(drag.holdTimer);
        drag.holdTimer = null;
      }
    }

    function startSelecting() {
      drag.selecting = true;
      document.body.classList.add("selecting"); // band tracks snappily + locks scroll
      try { drag.captureTarget?.setPointerCapture?.(drag.pointerId); } catch { /* ignore */ }
    }

    function beginPointer(event, hoursEl, captureTarget) {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      const slot = slotFromClientX(event.clientX, hoursEl);
      drag.active = true;
      drag.selecting = false;
      drag.anchor = slot;
      drag.startX = event.clientX;
      drag.startY = event.clientY;
      drag.pointerType = event.pointerType;
      drag.pointerId = event.pointerId;
      drag.hoursEl = hoursEl;
      drag.captureTarget = captureTarget;
      clearHold();

      if (event.pointerType === "touch") {
        // Hold still to enter selection mode; a quick swipe scrolls instead.
        drag.holdTimer = setTimeout(() => {
          if (drag.active && !drag.selecting) {
            startSelecting();
            navigator.vibrate?.(15); // subtle haptic where supported
            liveRange(drag.anchor, drag.anchor); // seed a 30m selection immediately
          }
        }, TOUCH_HOLD_MS);
      }
    }

    function movePointer(event) {
      if (!drag.active) return;
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;

      if (!drag.selecting) {
        if (drag.pointerType === "touch") {
          // Moved before the hold fired => it's a scroll; bail out of selection.
          if (Math.hypot(dx, dy) > TOUCH_MOVE_TOL) {
            clearHold();
            drag.active = false;
          }
          return;
        }
        // Mouse / pen: only start selecting after crossing the threshold.
        if (Math.abs(dx) <= DRAG_THRESHOLD && Math.abs(dy) <= DRAG_THRESHOLD) return;
        startSelecting();
      }

      event.preventDefault();
      const cur = slotFromClientX(event.clientX, drag.hoursEl);
      liveRange(drag.anchor, cur);
    }

    function endPointer(event) {
      if (!drag.active) return;
      clearHold();
      const wasSelecting = drag.selecting;
      try { drag.captureTarget?.releasePointerCapture?.(drag.pointerId); } catch { /* ignore */ }
      drag.active = false;
      drag.selecting = false;
      document.body.classList.remove("selecting"); // re-enable the eased settle glide

      if (!wasSelecting) {
        liveRange(drag.anchor, drag.anchor); // tap = 30m minimum
      }
      // Selected on the rendered yesterday/tomorrow? Make that day the base date
      // (the absolute instant is untouched and the view doesn't move).
      applyCanonical();
      save();
    }

    /* ===== ui/reorder.js ===== */

    /* Glass Time — ui/reorder
       Drag a city card vertically to reorder rows. Mouse: drag past a small
       vertical threshold. Touch: hold ~220ms to lift (a quick vertical swipe still
       scrolls the page), then drag. Dropping into position 0 makes that city the
       base, preserving the selected real-world instant. */

    const rowDrag = {
      active: false,
      lifted: false,
      pointerId: null,
      pointerType: "",
      row: null,
      startX: 0,
      startY: 0,
      holdTimer: null,
      rows: [],
      mids: [],
      fromIndex: 0,
      target: 0,
      rowH: 0,
      instant: null,
      baseId: null,
      suppressClick: false
    };

    function rowDragClearHold() {
      if (rowDrag.holdTimer) {
        clearTimeout(rowDrag.holdTimer);
        rowDrag.holdTimer = null;
      }
    }

    function liftRow() {
      rowDrag.lifted = true;
      rowDrag.suppressClick = true;
      rowDrag.rows = [...els.rows.querySelectorAll(".row")];
      rowDrag.fromIndex = rowDrag.rows.indexOf(rowDrag.row);
      rowDrag.target = rowDrag.fromIndex;
      rowDrag.mids = rowDrag.rows.map(r => {
        const b = r.getBoundingClientRect();
        return b.top + b.height / 2;
      });
      rowDrag.rowH = rowDrag.row.getBoundingClientRect().height;
      rowDrag.instant = selectedInstant();
      rowDrag.baseId = state.zones[0] ? state.zones[0].id : null;
      document.body.classList.add("reordering");
      rowDrag.row.classList.add("lifting");
      navigator.vibrate?.(15);
    }

    function followRow(clientY) {
      rowDrag.row.style.transform = `translateY(${clientY - rowDrag.startY}px)`;

      // Insertion index = how many *other* rows' (original) midpoints sit above the pointer.
      let t = 0;
      rowDrag.mids.forEach((m, i) => {
        if (i !== rowDrag.fromIndex && m < clientY) t++;
      });
      rowDrag.target = Math.max(0, Math.min(rowDrag.rows.length - 1, t));

      rowDrag.rows.forEach((r, i) => {
        if (r === rowDrag.row) return;
        let shift = 0;
        if (i > rowDrag.fromIndex && i <= rowDrag.target) shift = -rowDrag.rowH;
        else if (i < rowDrag.fromIndex && i >= rowDrag.target) shift = rowDrag.rowH;
        r.style.transform = shift ? `translateY(${shift}px)` : "";
      });
    }

    function dropRow() {
      const { fromIndex, target } = rowDrag;
      document.body.classList.remove("reordering");
      rowDrag.row.classList.remove("lifting");
      rowDrag.row.style.transform = "";
      rowDrag.rows.forEach(r => { r.style.transform = ""; });
      rowDrag.lifted = false;

      if (target === fromIndex) return; // nothing moved

      const [zone] = state.zones.splice(fromIndex, 1);
      state.zones.splice(target, 0, zone);

      // New base? Re-express the selected instant in its wall time (same rule as
      // moveZoneToBase) so the absolute selection never shifts.
      if (state.zones[0] && state.zones[0].id !== rowDrag.baseId && rowDrag.instant) {
        const duration = normalizedRange().durationSlots;
        const p = getParts(rowDrag.instant, state.zones[0].timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
      }

      render();
      showToast(target === 0 ? `${zone.label} ahora es la base.` : `${zone.label} reordenada.`);
    }

    function initRowReorder() {
      els.rows.addEventListener("pointerdown", event => {
        const card = event.target.closest(".city-card");
        if (!card || event.target.closest(".mini-btn")) return;
        if (event.pointerType === "mouse" && event.button !== 0) return;
        rowDrag.active = true;
        rowDrag.lifted = false;
        rowDrag.suppressClick = false;
        rowDrag.row = card.closest(".row");
        rowDrag.pointerId = event.pointerId;
        rowDrag.pointerType = event.pointerType;
        rowDrag.startX = event.clientX;
        rowDrag.startY = event.clientY;
        rowDragClearHold();
        if (event.pointerType === "touch") {
          rowDrag.holdTimer = setTimeout(() => {
            if (rowDrag.active && !rowDrag.lifted) liftRow();
          }, 220);
        }
      });

      document.addEventListener("pointermove", event => {
        if (!rowDrag.active) return;
        const dx = event.clientX - rowDrag.startX;
        const dy = event.clientY - rowDrag.startY;

        if (!rowDrag.lifted) {
          if (rowDrag.pointerType === "touch") {
            // Moved before the hold fired => it's a page scroll; bail out.
            if (Math.hypot(dx, dy) > 10) {
              rowDragClearHold();
              rowDrag.active = false;
            }
            return;
          }
          // Mouse/pen: a mostly-vertical drag lifts the row.
          if (Math.abs(dy) <= 6 || Math.abs(dy) < Math.abs(dx)) return;
          liftRow();
        }

        event.preventDefault();
        followRow(event.clientY);
      }, { passive: false });

      const endRowDrag = () => {
        if (!rowDrag.active) return;
        rowDragClearHold();
        if (rowDrag.lifted) dropRow();
        rowDrag.active = false;
      };
      document.addEventListener("pointerup", endRowDrag);
      document.addEventListener("pointercancel", endRowDrag);

      // While a row is lifted on touch, block native panning so the drag reorders.
      document.addEventListener("touchmove", event => {
        if (rowDrag.lifted) event.preventDefault();
      }, { passive: false });
    }

    /* ===== ui/timezone-picker.js ===== */

    /* Glass Time — ui/timezone-picker
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timezone picker (bottom sheet) ---------- */

    function openPicker(mode, zoneId = null) {
      state.pickerMode = mode;
      state.editingZoneId = zoneId;
      const zone = state.zones.find(z => z.id === zoneId);

      els.sheetTitle.textContent = mode === "add" ? "Añadir ciudad" : `Cambiar ${zone?.label || "ciudad"}`;
      els.sheetSubtitle.textContent = mode === "add"
        ? "Elige una zona horaria para añadirla a la timeline."
        : "Toca una opción para reemplazar esta ciudad.";

      els.zoneSearch.value = "";
      renderZoneOptions("");
      els.backdrop.classList.add("open");
      els.sheet.classList.add("open");
      setTimeout(() => els.zoneSearch.focus(), 80);
    }

    function closePicker() {
      els.backdrop.classList.remove("open");
      els.sheet.classList.remove("open");
      state.editingZoneId = null;
    }

    const RECENT_KEY = "glass-time-recent-zones";

    function recentZones() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY)) || []; } catch { return []; }
    }

    function rememberZone(label, timeZone) {
      try {
        const list = [[label, timeZone], ...recentZones().filter(z => z[1] !== timeZone || z[0] !== label)].slice(0, 3);
        localStorage.setItem(RECENT_KEY, JSON.stringify(list));
      } catch { /* ignore */ }
    }

    function zoneOptionHTML(now) {
      return ([label, timeZone]) => {
        const p = getParts(now, timeZone);
        return `
          <button class="zone-option" data-label="${escapeHTML(label)}" data-timezone="${escapeHTML(timeZone)}">
            <span>
              <strong>${escapeHTML(label)}</strong>
              <span>${escapeHTML(zoneSubtitle(timeZone, label))} · Ahora ${fmtDisplayTime(p.hour, p.minute)}</span>
            </span>
            <em>${offsetText(now, timeZone)}</em>
          </button>
        `;
      };
    }

    function renderZoneOptions(query) {
      const q = normSearch(query.trim());
      const now = new Date();
      const hit = ([label, timeZone]) => !q || normSearch(`${label} ${timeZone}`).includes(q);
      const option = zoneOptionHTML(now);

      // Curated cities first; with a query, extend into the full IANA list (~418
      // zones from the runtime) skipping timezones the curated hits already cover.
      const curated = ZONE_LIBRARY.filter(hit);

      if (!q) {
        // Browsing: last-used zones on top, then the curated library.
        const recent = recentZones();
        const recentHTML = recent.length
          ? `<div class="zone-group-label">Recientes</div>` + recent.map(option).join("") +
            `<div class="zone-group-label">Todas las ciudades</div>`
          : "";
        els.zoneList.innerHTML = recentHTML + curated.map(option).join("");
        return;
      }

      const seenTz = new Set(curated.map(z => z[1]));
      const extra = fullZoneList().filter(z => !seenTz.has(z[1]) && hit(z));
      const matches = curated.concat(extra).slice(0, 60);

      if (!matches.length) {
        els.zoneList.innerHTML = `<div class="zone-empty">Sin resultados para “${escapeHTML(query)}”.</div>`;
        return;
      }

      els.zoneList.innerHTML = matches.map(option).join("");
    }

    function chooseZone(label, timeZone) {
      rememberZone(label, timeZone);
      if (state.pickerMode === "add") {
        const instant = selectedInstant();
        const duration = normalizedRange().durationSlots;
        const newZone = { id: id(), label, timeZone };
        state.zones.unshift(newZone);
        // New city becomes base — preserve the real-world instant + duration.
        const p = getParts(instant, timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
        showToast(`${label} añadido como base.`);
      } else {
        const zone = state.zones.find(z => z.id === state.editingZoneId);
        if (zone) {
          const editedId = zone.id;
          zone.label = label;
          zone.timeZone = timeZone;
          moveZoneToBase(editedId, true);
          showToast(`${label} seleccionado como base.`);
        }
      }

      closePicker();
      render();
    }

    /* ===== ui/calendar-menu.js ===== */

    /* Glass Time — ui/calendar-menu
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- calendar menu ---------- */

    function setCalendarMenu(open) {
      state.calendarMenuOpen = open;
      els.calendarMenu.classList.toggle("open", open);
      els.calendarMenuBtn.setAttribute("aria-expanded", String(open));
      if (open) {
        const { start, end } = normalizedRange();
        if (!els.eventTitleInput.value.trim()) {
          els.eventTitleInput.value = `Recordatorio · ${baseZone().label} ${fmtSlot(start)}–${fmtSlot(end)}`;
          els.eventTitleInput.select();
        }
        setTimeout(() => els.eventTitleInput.focus(), 50);
      }
    }

    function toggleCalendarMenu() {
      setCalendarMenu(!state.calendarMenuOpen);
    }

    /* ===== ui/share.js ===== */

    /* Glass Time — ui/share
       Shareable state: a URL that encodes the current selection, and a glass image
       card (canvas -> PNG) shared via the Web Share API or downloaded. */

    function buildShareURL() {
      const { start, end } = normalizedRange();
      const params = new URLSearchParams();
      params.set("d", state.dateISO);
      params.set("s", start);
      params.set("e", end);
      params.set("z", state.zones.map(z => `${z.label}~${z.timeZone}`).join(";"));
      return `${location.origin}${location.pathname}?${params.toString()}`;
    }

    /* Apply state encoded in the URL (if any). Returns true when applied. */
    function applyStateFromURL() {
      const p = new URLSearchParams(location.search);
      if (!p.has("z") && !p.has("d")) return false;
      try {
        const z = p.get("z");
        if (z) {
          const zones = z.split(";").map(item => {
            const sep = item.indexOf("~");
            const label = item.slice(0, sep);
            const timeZone = item.slice(sep + 1);
            return { id: id(), label, timeZone };
          }).filter(zone => zone.timeZone);
          if (zones.length) state.zones = zones;
        }
        if (p.get("d")) state.dateISO = p.get("d");
        const s = parseInt(p.get("s"), 10);
        const e = parseInt(p.get("e"), 10);
        if (Number.isInteger(s)) state.selectedStartSlot = clampSlot(s);
        if (Number.isInteger(e)) state.selectedEndSlot = clampSlot(e);
        state.cursorSlot = state.selectedStartSlot;
        return true;
      } catch {
        return false;
      }
    }

    function roundRectPath(ctx, px, py, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(px + r, py);
      ctx.arcTo(px + w, py, px + w, py + h, r);
      ctx.arcTo(px + w, py + h, px, py + h, r);
      ctx.arcTo(px, py + h, px, py, r);
      ctx.arcTo(px, py, px + w, py, r);
      ctx.closePath();
    }

    /* Render a premium glass card summarising the selection across all cities. */
    function buildShareCanvas() {
      const W = 1080, H = 1350;
      const c = document.createElement("canvas");
      c.width = W; c.height = H;
      const x = c.getContext("2d");

      // Background
      const bg = x.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, "#080a16");
      bg.addColorStop(0.6, "#10152a");
      bg.addColorStop(1, "#181d38");
      x.fillStyle = bg; x.fillRect(0, 0, W, H);
      const glow1 = x.createRadialGradient(W * 0.16, H * 0.08, 0, W * 0.16, H * 0.08, W * 0.7);
      glow1.addColorStop(0, "rgba(115,198,255,.34)"); glow1.addColorStop(1, "rgba(115,198,255,0)");
      x.fillStyle = glow1; x.fillRect(0, 0, W, H);
      const glow2 = x.createRadialGradient(W * 0.9, H * 0.95, 0, W * 0.9, H * 0.95, W * 0.7);
      glow2.addColorStop(0, "rgba(255,181,223,.24)"); glow2.addColorStop(1, "rgba(255,181,223,0)");
      x.fillStyle = glow2; x.fillRect(0, 0, W, H);

      const base = baseZone();
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      const baseStart = getParts(startInstant, base.timeZone);
      const baseEnd = getParts(endInstant, base.timeZone);
      const { durationSlots } = normalizedRange();

      const pad = 84;
      let y = 150;

      // Brand
      x.fillStyle = "rgba(255,255,255,.62)";
      x.font = "600 30px -apple-system, Inter, Segoe UI, sans-serif";
      x.textBaseline = "alphabetic";
      x.fillText("G L A S S   T I M E", pad, y);

      // Headline
      y += 110;
      x.fillStyle = "#ffffff";
      x.font = "800 116px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(durationText(durationSlots), pad, y);

      y += 70;
      x.fillStyle = "rgba(255,255,255,.82)";
      x.font = "600 44px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(`${base.label} · ${fmtDisplayTime(baseStart.hour, baseStart.minute)}–${fmtDisplayTime(baseEnd.hour, baseEnd.minute)}`, pad, y);

      y += 56;
      x.fillStyle = "rgba(255,255,255,.5)";
      x.font = "500 34px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(new Intl.DateTimeFormat("es-ES", { weekday: "long", day: "numeric", month: "long", year: "numeric", timeZone: base.timeZone }).format(startInstant), pad, y);

      // City rows
      y += 96;
      const rowH = 132;
      const colors = COLORS;
      state.zones.forEach((zone, i) => {
        if (y + rowH > H - 130) return; // keep within the card
        roundRectPath(x, pad, y - 60, W - pad * 2, rowH - 24, 28);
        x.fillStyle = "rgba(255,255,255,.05)";
        x.fill();

        // color dot
        x.fillStyle = colors[i % colors.length];
        x.beginPath(); x.arc(pad + 44, y, 16, 0, Math.PI * 2); x.fill();

        const s = getParts(startInstant, zone.timeZone);
        const e = getParts(endInstant, zone.timeZone);

        x.fillStyle = "#ffffff";
        x.font = "700 42px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(zone.label, pad + 84, y + 4);

        x.fillStyle = "rgba(255,255,255,.55)";
        x.font = "500 28px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(zoneSubtitle(zone.timeZone, zone.label), pad + 84, y + 40);

        const range = `${fmtDisplayTime(s.hour, s.minute)}–${fmtDisplayTime(e.hour, e.minute)}`;
        x.fillStyle = "rgba(255,255,255,.92)";
        x.font = "700 42px -apple-system, Inter, Segoe UI, sans-serif";
        x.textAlign = "right";
        x.fillText(range, W - pad - 24, y + 4);
        x.fillStyle = "rgba(255,255,255,.5)";
        x.font = "500 28px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(offsetText(startInstant, zone.timeZone), W - pad - 24, y + 40);
        x.textAlign = "left";

        y += rowH;
      });

      // Footer
      x.fillStyle = "rgba(255,255,255,.4)";
      x.font = "500 30px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText("peperonioo.github.io/glass-time-converter", pad, H - 70);

      return c;
    }

    async function shareSelection() {
      const url = buildShareURL();
      const canvas = buildShareCanvas();
      canvas.toBlob(async blob => {
        const file = blob && new File([blob], `glass-time-${state.dateISO}.png`, { type: "image/png" });
        if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: "Glass Time",
              text: `Hora seleccionada · ${baseZone().label}`,
              url
            });
            return;
          } catch { /* user cancelled or unsupported — fall through */ }
        }
        if (blob) {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = file.name;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
        }
        navigator.clipboard?.writeText(url);
        showToast("Imagen guardada · link copiado");
      }, "image/png");
    }

    /* ===== ui/onboarding.js ===== */

    /* Glass Time — ui/onboarding
       First-run coach marks (the gestures are invisible otherwise) and a one-time
       iOS "add to home screen" hint. Everything dismisses on tap, persists in
       localStorage, and never shows twice. */

    const ONBOARD_KEY = "glass-time-onboard-v1";
    const INSTALL_KEY = "glass-time-install-hint";
    const VISITS_KEY = "glass-time-visits";

    function showCoach(step) {
      const isTouch = window.matchMedia("(pointer: coarse)").matches;
      const tips = [
        {
          anchor: () => els.rows.querySelector(".row:first-child .cell[data-hour='9']") || els.rows.querySelector(".cell"),
          text: isTouch
            ? "<b>Mantén pulsado</b> y arrastra para elegir un rango de horas"
            : "<b>Haz clic y arrastra</b> para elegir un rango de horas"
        },
        {
          anchor: () => els.rows.querySelector(".city-card"),
          text: isTouch
            ? "Toca una ciudad para cambiarla · <b>doble toque</b> = ahora · <b>mantén y arrastra ↑↓</b> para reordenar"
            : "Haz clic en una ciudad para cambiarla · <b>doble clic</b> = ahora · <b>arrastra ↑↓</b> para reordenar"
        }
      ];

      if (step >= tips.length) {
        try { localStorage.setItem(ONBOARD_KEY, "1"); } catch { /* ignore */ }
        return;
      }

      const target = tips[step].anchor();
      if (!target) { showCoach(step + 1); return; }

      const rect = target.getBoundingClientRect();
      const tip = document.createElement("div");
      tip.className = "coach";
      tip.innerHTML = `<span>${tips[step].text}</span><em>toca para seguir</em>`;
      document.body.appendChild(tip);

      // Place under the anchor, clamped to the viewport.
      const place = () => {
        const w = tip.offsetWidth;
        const left = Math.max(10, Math.min(window.innerWidth - w - 10, rect.left + rect.width / 2 - w / 2));
        tip.style.left = `${left}px`;
        tip.style.top = `${Math.min(window.innerHeight - tip.offsetHeight - 12, rect.bottom + 10)}px`;
      };
      place();
      requestAnimationFrame(() => tip.classList.add("show"));

      let done = false;
      const next = () => {
        if (done) return;
        done = true;
        tip.classList.remove("show");
        setTimeout(() => tip.remove(), 250);
        setTimeout(() => showCoach(step + 1), 320);
      };
      tip.addEventListener("pointerdown", next);
      document.addEventListener("pointerdown", next, { once: true, capture: true });
      setTimeout(next, 8000); // auto-advance
    }

    function maybeShowInstallHint() {
      const ua = navigator.userAgent || "";
      const isIOS = /iphone|ipad|ipod/i.test(ua);
      const standalone = navigator.standalone === true || window.matchMedia("(display-mode: standalone)").matches;
      if (!isIOS || standalone) return;
      let visits = 0;
      try {
        if (localStorage.getItem(INSTALL_KEY)) return;
        visits = (parseInt(localStorage.getItem(VISITS_KEY), 10) || 0) + 1;
        localStorage.setItem(VISITS_KEY, String(visits));
      } catch { return; }
      if (visits < 2) return; // don't nag on the very first visit

      const hint = document.createElement("div");
      hint.className = "install-hint";
      hint.innerHTML = `<span>Instálala: <b>Compartir <svg viewBox="0 0 16 20" aria-hidden="true"><path d="M8 1l3.5 3.5-.9.9L8.6 3.4V13H7.4V3.4L5.4 5.4l-.9-.9L8 1zM3 8h2v1.2H4.2v8.6h7.6V9.2H10V8h2a1 1 0 0 1 1 1v9.8a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z" fill="currentColor"/></svg></b> → “Añadir a pantalla de inicio”</span><button aria-label="Cerrar">×</button>`;
      document.body.appendChild(hint);
      requestAnimationFrame(() => hint.classList.add("show"));
      const dismiss = () => {
        try { localStorage.setItem(INSTALL_KEY, "1"); } catch { /* ignore */ }
        hint.classList.remove("show");
        setTimeout(() => hint.remove(), 300);
      };
      hint.querySelector("button").addEventListener("click", dismiss);
      setTimeout(dismiss, 12000);
    }

    function initOnboarding() {
      let seen = null;
      try { seen = localStorage.getItem(ONBOARD_KEY); } catch { seen = "1"; }
      if (!seen) setTimeout(() => showCoach(0), 1400);
      setTimeout(maybeShowInstallHint, 2600);
    }

    /* ===== main.js ===== */

    /* Glass Time — main (misc actions + wiring + bootstrap)
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- misc actions ---------- */

    function jumpNow() {
      const base = baseZone();
      const p = getParts(new Date(), base.timeZone);
      state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
      const currentSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
      state.selectedStartSlot = currentSlot;
      state.selectedEndSlot = clampSlot(currentSlot + 2);
      state.cursorSlot = currentSlot;
      render();
      focusHour();
    }

    function reset() {
      localStorage.removeItem(STORAGE_KEY);
      load();
      render();
      focusHour();
      showToast("Reset hecho.");
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    /* ---------- event wiring ---------- */

    function bindEvents() {
      els.prevBtn.addEventListener("click", () => {
        state.dateISO = addDays(state.dateISO, -1);
        render();
      });

      els.nextBtn.addEventListener("click", () => {
        state.dateISO = addDays(state.dateISO, 1);
        render();
      });

      els.dateInput.addEventListener("change", () => {
        if (els.dateInput.value) {
          state.dateISO = els.dateInput.value;
          render();
        }
      });

      els.nowBtn.addEventListener("click", jumpNow);
      els.copyBtn.addEventListener("click", copySelection);
      els.shareBtn.addEventListener("click", shareSelection);

      els.calendarMenuBtn.addEventListener("click", event => {
        event.stopPropagation();
        toggleCalendarMenu();
      });
      els.googleBtn.addEventListener("click", () => {
        setCalendarMenu(false);
        openGoogleCalendar();
      });
      els.icsBtn.addEventListener("click", () => {
        setCalendarMenu(false);
        downloadICS();
      });

      els.resetBtn.addEventListener("click", reset);
      els.addBtn.addEventListener("click", () => openPicker("add"));

      /* --- Timeline pointer interactions (no rerender on movement) --- */

      // Hover cursor band (mouse/pen only — touch must not steal scroll).
      els.rows.addEventListener("pointermove", event => {
        if (drag.active || event.pointerType === "touch") return;
        const cell = event.target.closest(".cell");
        if (cell) updateCursorDOM(slotFromClientX(event.clientX, cell.closest(".hours")));
      });

      // Selection start.
      els.rows.addEventListener("pointerdown", event => {
        if (event.target.closest(".city-card")) return;
        const cell = event.target.closest(".cell");
        if (!cell) return;
        beginPointer(event, cell.closest(".hours"), els.rows);
      });

      document.addEventListener("pointermove", movePointer, { passive: false });
      document.addEventListener("pointerup", endPointer);
      document.addEventListener("pointercancel", endPointer);

      // While a touch selection is active, block the page/scroller from panning so
      // the drag selects instead of scrolling.
      document.addEventListener("touchmove", event => {
        if (drag.selecting && drag.pointerType === "touch") event.preventDefault();
      }, { passive: false });

      // City card actions (click — not part of the drag system).
      // Single tap (slightly delayed) opens the picker; a double-tap jumps to "now".
      const cityTap = { id: null, t: 0, timer: null };

      els.rows.addEventListener("click", event => {
        if (rowDrag.suppressClick) { rowDrag.suppressClick = false; return; } // ended a reorder drag
        const row = event.target.closest(".row");
        if (!row) return;

        if (event.target.closest(".remove-zone")) {
          event.stopPropagation();
          if (state.zones.length <= 1) return;
          state.zones = state.zones.filter(z => z.id !== row.dataset.zoneId);
          render();
          return;
        }

        if (event.target.closest(".make-base")) {
          event.stopPropagation();
          const i = state.zones.findIndex(z => z.id === row.dataset.zoneId);
          if (i > 0) {
            const zone = state.zones[i];
            moveZoneToBase(zone.id, true);
            render();
            showToast(`${zone.label} ahora es la base.`);
          }
          return;
        }

        if (event.target.closest(".cell")) return;

        if (event.target.closest(".city-card")) {
          const zoneId = row.dataset.zoneId;
          const now = Date.now();

          if (cityTap.id === zoneId && now - cityTap.t < 320) {
            // Double-tap: jump the selection to the current instant.
            clearTimeout(cityTap.timer);
            cityTap.timer = null;
            cityTap.id = null;
            const zone = state.zones.find(z => z.id === zoneId);
            jumpNow();
            if (zone) {
              const c = getParts(new Date(), zone.timeZone);
              showToast(`Ahora en ${zone.label} · ${fmtDisplayTime(c.hour, c.minute)}`);
            }
            return;
          }

          cityTap.id = zoneId;
          cityTap.t = now;
          clearTimeout(cityTap.timer);
          cityTap.timer = setTimeout(() => {
            cityTap.id = null;
            openPicker("edit", zoneId);
          }, 300);
        }
      });

      els.zoneSearch.addEventListener("input", () => renderZoneOptions(els.zoneSearch.value));

      els.zoneList.addEventListener("click", event => {
        const option = event.target.closest(".zone-option");
        if (!option) return;
        chooseZone(option.dataset.label, option.dataset.timezone);
      });

      els.closeSheetBtn.addEventListener("click", closePicker);
      els.backdrop.addEventListener("click", closePicker);

      document.addEventListener("click", event => {
        if (!event.target.closest(".calendar-menu")) setCalendarMenu(false);
      });

      window.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          closePicker();
          setCalendarMenu(false);
        }
        if (event.target.matches("input")) return;

        // Arrows can walk across midnight: the window re-anchors (canonicalize)
        // so stepping past 24:00 simply moves into the next day.
        if (event.key === "ArrowLeft" || event.key === "ArrowRight") {
          const dir = event.key === "ArrowLeft" ? -1 : 1;
          const duration = normalizedRange().durationSlots;
          const nextStart = clampSlot(normalizedRange().start + dir);
          state.selectedStartSlot = nextStart;
          state.selectedEndSlot = Math.min(VIEW_SLOT1, nextStart + duration);
          state.cursorSlot = nextStart;
          canonicalizeSelection();
          render();
          focusHour();
        }
      });
    }

    /* ---------- bootstrap ---------- */

    load();
    // A shared link overrides stored state, then we clean the URL so refreshes use
    // the (now-persisted) state normally.
    if (applyStateFromURL()) {
      save();
      history.replaceState(null, "", location.origin + location.pathname);
    }
    bindEvents();
    initRowReorder();
    render();
    setTimeout(focusHour, 160);
    initOnboarding();

    // Staggered entrance for the rows on first mount only.
    const board = document.querySelector(".board");
    if (board) {
      board.classList.add("intro");
      setTimeout(() => board.classList.remove("intro"), 1500);
    }

    // Keep the clock alive: tick "Ahora" times + the now-marker every 30s,
    // and re-sync on the next exact minute.
    updateLiveClock();
    setInterval(updateLiveClock, 30000);
    const msToNextMinute = (60 - new Date().getSeconds()) * 1000;
    setTimeout(updateLiveClock, msToNextMinute);

  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
