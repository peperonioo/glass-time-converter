<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glass Time — Visual Timezone Converter</title>
  <style>
    :root {
      --bg: #070812;
      --bg2: #10152a;
      --text: rgba(255,255,255,.94);
      --soft: rgba(255,255,255,.66);
      --muted: rgba(255,255,255,.42);
      --line: rgba(255,255,255,.12);
      --glass: rgba(255,255,255,.09);
      --glass2: rgba(255,255,255,.14);
      --ink: rgba(5,8,18,.72);
      --blue: #9fd7ff;
      --violet: #d9b8ff;
      --mint: #bdf7d2;
      --peach: #ffd2b7;
      --pink: #ffb5df;
      --cell: 64px;
      --city: 250px;
      --row: 72px;
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 14% 10%, rgba(115, 198, 255, .32), transparent 31%),
        radial-gradient(circle at 82% 7%, rgba(217, 184, 255, .30), transparent 27%),
        radial-gradient(circle at 76% 88%, rgba(255, 181, 223, .16), transparent 34%),
        linear-gradient(145deg, var(--bg), var(--bg2) 58%, #171b35);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 22%, transparent 70%, rgba(255,255,255,.04)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 42%);
      mix-blend-mode: overlay;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1420px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 34px;
      position: relative;
      z-index: 1;
    }

    .nav {
      position: sticky;
      top: 12px;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.95), transparent 18%),
        linear-gradient(135deg, var(--blue), var(--violet) 48%, var(--pink));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.62),
        0 20px 70px rgba(159,215,255,.22);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      letter-spacing: -.055em;
      line-height: .95;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--soft);
      font-size: 13px;
    }

    .island {
      width: min(610px, 52vw);
      min-height: 58px;
      padding: 10px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        rgba(3, 5, 12, .72);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 20px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
    }

    .island small {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .island strong {
      display: block;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.05;
      letter-spacing: -.055em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .island .chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.11);
      color: rgba(255,255,255,.78);
      font-size: 12px;
      flex: 0 0 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48%;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .glass-btn {
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(20px);
      color: rgba(255,255,255,.86);
      transition: transform .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease);
    }

    .glass-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.24);
    }

    .calendar-menu {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .calendar-plus {
      padding-left: 13px;
      padding-right: 15px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.17), rgba(255,255,255,.075)),
        rgba(3,5,12,.55);
      border-color: rgba(255,255,255,.18);
    }

    .calendar-popover {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: min(330px, calc(100vw - 32px));
      padding: 8px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.07)),
        rgba(5, 7, 15, .86);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 26px 80px rgba(0,0,0,.46);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
      opacity: 0;
      transform: translateY(-6px) scale(.98);
      pointer-events: none;
      transition: opacity .18s var(--ease), transform .18s var(--ease);
      z-index: 70;
    }

    .calendar-title-field {
      padding: 8px 8px 6px;
    }

    .calendar-title-field label {
      display: block;
      margin: 0 0 7px 4px;
      color: var(--soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .calendar-title-field input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      background: rgba(0,0,0,.22);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .calendar-menu.open .calendar-popover {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .calendar-choice {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      padding: 11px;
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      transition: background .16s var(--ease), transform .16s var(--ease);
    }

    .calendar-choice:hover {
      background: rgba(255,255,255,.11);
      transform: translateY(-1px);
    }

    .choice-icon {
      width: 38px;
      height: 38px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(159,215,255,.32), rgba(217,184,255,.25)),
        rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 800;
    }

    .calendar-choice strong {
      display: block;
      font-size: 14px;
      letter-spacing: -.02em;
    }

    .calendar-choice em {
      display: block;
      margin-top: 3px;
      font-style: normal;
      color: var(--soft);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055)),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 22px 65px rgba(0,0,0,.18);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    .date-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(3,5,12,.34);
      border: 1px solid rgba(255,255,255,.12);
    }

    .date-pill span {
      color: var(--soft);
      font-size: 13px;
    }

    input[type="date"] {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      color-scheme: dark;
      min-width: 132px;
    }

    .hint {
      color: var(--soft);
      font-size: 13px;
      text-align: center;
    }

    .right-tools {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .board {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.045)),
        rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 24px 80px rgba(0,0,0,.24);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
    }

    .header-row,
    .time-row {
      display: grid;
      grid-template-columns: var(--city) 1fr;
    }

    .left-head {
      min-height: 74px;
      padding: 16px 18px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.045);
    }

    .left-head strong {
      display: block;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .base-date {
      margin-top: 5px;
      font-size: 13.5px;
      font-weight: 640;
      color: var(--text);
      letter-spacing: -.015em;
    }
    .base-date::first-letter {
      text-transform: uppercase;
    }

    .left-head span {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255,255,255,.82);
      background:
        linear-gradient(180deg, rgba(159,215,255,.18), rgba(217,184,255,.10)),
        rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
    }

    .scroll {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.28) transparent;
      /* Keep horizontal pan natural on trackpad / touch; never lock vertical page scroll */
      touch-action: pan-x pan-y;
      overscroll-behavior-x: contain;
    }

    .hours {
      position: relative;
      display: grid;
      grid-template-columns: repeat(24, var(--cell));
      width: calc(24 * var(--cell));
    }

    .hour-head {
      position: relative;
      min-height: 74px;
      padding: 18px 5px 9px;
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(255,255,255,.09);
      border-bottom: 1px solid var(--line);
      text-align: center;
      background: rgba(255,255,255,.032);
    }

    .hour-head .h {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
    }

    .time-stack {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      line-height: .9;
      gap: 5px;
    }

    .time-stack .num {
      font-size: 24px;
      font-weight: 820;
      letter-spacing: -.07em;
    }

    .time-stack .ampm {
      font-size: 10px;
      font-weight: 760;
      letter-spacing: .10em;
      color: rgba(255,255,255,.48);
    }

    .cell.selected .time-stack .ampm {
      color: rgba(255,255,255,.82);
    }

    /* Soft full-cell cursor band — sits behind the time number, never blocks text */
    .cursor-band {
      position: absolute;
      z-index: 1;
      inset: 3px 3px;
      border-radius: 18px;
      opacity: 0;
      transform: scaleX(.9);
      background:
        linear-gradient(180deg, rgba(159,215,255,.14), rgba(217,184,255,.09)),
        rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.26),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 0 26px rgba(159,215,255,.22);
      transition: opacity .14s var(--ease), transform .14s var(--ease), border-color .14s var(--ease);
      pointer-events: none;
      will-change: opacity, transform;
    }

    .hour-head.cursor .cursor-band,
    .cell.cursor .cursor-band {
      opacity: 1;
      transform: scaleX(1);
    }

    .hour-head.cursor,
    .cell.cursor {
      background-image: linear-gradient(180deg, rgba(159,215,255,.045), rgba(217,184,255,.035));
    }

    .cell.cursor .time-stack .ampm,
    .hour-head.cursor .time-stack .ampm {
      color: rgba(255,255,255,.86);
    }

    .hour-head .d {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .time-row {
      min-height: var(--row);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .time-row:last-child {
      border-bottom: 0;
    }

    .city-card {
      position: relative;
      min-height: var(--row);
      padding: 10px 12px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.028);
      display: flex;
      align-items: center;
      gap: 11px;
      transition: background .18s var(--ease);
      cursor: pointer;
      user-select: none;
    }

    .city-card:hover {
      background: rgba(255,255,255,.07);
    }

    .city-card.anchor {
      background:
        linear-gradient(90deg, rgba(159,215,255,.13), rgba(217,184,255,.05)),
        rgba(255,255,255,.035);
    }

    .city-glow {
      width: 12px;
      align-self: stretch;
      min-height: 44px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue), var(--violet));
      box-shadow: 0 0 24px rgba(159,215,255,.24);
      flex: 0 0 auto;
      opacity: .92;
    }

    .city-main {
      min-width: 0;
      flex: 1;
    }

    .city-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .city-name {
      font-size: 16px;
      font-weight: 780;
      letter-spacing: -.025em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .base-tag {
      flex: 0 0 auto;
      font-size: 9px;
      font-weight: 820;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(8,12,24,.9);
      background: linear-gradient(180deg, var(--blue), var(--violet));
      padding: 2px 7px;
      border-radius: 999px;
    }

    .offset {
      color: var(--muted);
      font-size: 11px;
      flex: 0 0 auto;
      margin-left: auto;
    }

    .current-time {
      margin-top: 5px;
      color: rgba(255,255,255,.82);
      font-size: 13px;
      letter-spacing: -.01em;
    }

    /* IANA zone — kept for reference but visually quietest line. */
    .zone-name {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10.5px;
      letter-spacing: .005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: .85;
    }

    /* Actions overlay on the right and reveal on hover, so the city name keeps
       the full row width and stays prominent. */
    .city-actions {
      position: absolute;
      right: 10px;
      top: 50%;
      display: flex;
      gap: 5px;
      padding: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(10,12,22,.78) 26%);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(6px);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }

    .city-card:hover .city-actions,
    .city-card:focus-within .city-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
    }

    .mini-btn {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.66);
      transition: background .18s var(--ease), color .18s var(--ease), transform .18s var(--ease);
    }

    .mini-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      color: var(--text);
    }

    .cell {
      height: var(--row);
      border-right: 1px solid rgba(255,255,255,.075);
      display: grid;
      place-items: center;
      position: relative;
      color: rgba(255,255,255,.80);
      cursor: pointer;
      user-select: none;
      transition: background .14s var(--ease), color .14s var(--ease);
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 9px 5px;
      border-radius: 17px;
      background: transparent;
      transform: scale(.93);
      transition: background .16s var(--ease), transform .16s var(--ease), box-shadow .16s var(--ease);
    }

    .cell:hover::before {
      background: rgba(255,255,255,.10);
      transform: scale(1);
    }

    /* One continuous selection band per row that glides between half-hour
       slots instead of painting cell-by-cell. --sel-start / --sel-len are set
       (in half-hour units) on the parent .hours element. */
    .sel-band {
      position: absolute;
      z-index: 0;
      top: 8px;
      bottom: 8px;
      left: calc(var(--sel-start, 18) * (var(--cell) / 2) + 4px);
      width: calc(var(--sel-len, 2) * (var(--cell) / 2) - 8px);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(159,215,255,.50), rgba(217,184,255,.36));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.50),
        inset 0 -1px 0 rgba(255,255,255,.12),
        0 14px 38px rgba(159,215,255,.20);
      pointer-events: none;
      transform: translateZ(0);
      transition:
        left .42s var(--ease),
        width .42s var(--ease);
      will-change: left, width;
      animation: gt-band-breathe 4.5s ease-in-out infinite;
    }

    /* Soft top sheen for depth. */
    .sel-band::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.22), transparent 46%);
      pointer-events: none;
    }

    /* Snappier tracking while actively dragging a selection. */
    body.selecting .sel-band {
      transition-duration: .12s;
      animation: none;
    }

    .cell.selected .time-stack .num {
      color: #fff;
    }

    .cell.cursor .cursor-band {
      border-color: rgba(255,255,255,.45);
      background:
        linear-gradient(180deg, rgba(159,215,255,.16), rgba(217,184,255,.11)),
        rgba(255,255,255,.05);
    }

    .cell .t {
      position: relative;
      z-index: 1;
    }

    .cell .time-stack .num {
      font-size: 21px;
    }

    .cell .time-stack .ampm {
      font-size: 9px;
    }

    /* Daylight map — read at a glance when it's a good hour in each city.
       Deep night (quiet hours) -> dawn -> bright core day -> dusk. */
    .cell.night {
      color: rgba(255,255,255,.34);
      background: rgba(3,6,16,.42);
    }

    .cell.morning {
      background: rgba(255,205,150,.085);
    }

    .cell.work {
      background: rgba(150,232,185,.11);
    }

    .cell.evening {
      background: rgba(196,168,255,.085);
    }

    /* "Other day" veil: cells on the previous/next calendar day get a faint
       cool/warm tint so each day reads as its own block. */
    .cell.prev-day::after,
    .cell.next-day::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .cell.prev-day::after { background: rgba(96,128,210,.12); }
    .cell.next-day::after { background: rgba(255,176,120,.12); }
    .cell.prev-day .t,
    .cell.next-day .t { opacity: .72; }

    /* Day boundary: a clear, slightly accented midnight divider. */
    .cell.day-start,
    .hour-head.day-start:not(:first-child) {
      border-left: 2px solid rgba(159,215,255,.42);
    }

    /* Scroll-following day label: pinned to the left edge of the scroller,
       flips to the new date exactly when a midnight boundary scrolls past. */
    .day-pin {
      position: absolute;
      z-index: 4;
      top: 3px;
      left: 5px;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(6,9,18,.62);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.55);
      font-size: 8px;
      font-weight: 760;
      letter-spacing: .02em;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .day-pin.head-pin {
      top: 4px;
      font-size: 8.5px;
      color: rgba(255,255,255,.78);

    /* ---------- motion / polish ---------- */

    @keyframes gt-rise {
      from { opacity: 0; transform: translateY(16px) scale(.99); }

    @keyframes gt-band-breathe {

  <script>
    "use strict";

    /* ===== data/timezone-library.js ===== */

    /* Glass Time — data/timezone-library
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    const ZONE_LIBRARY = [

      ["Madrid", "Europe/Madrid"],
      ["Barcelona", "Europe/Madrid"],
      ["Las Palmas", "Atlantic/Canary"],
      ["London", "Europe/London"],
      ["Lisbon", "Europe/Lisbon"],

      ["Amsterdam", "Europe/Amsterdam"],
      ["Rome", "Europe/Rome"],
      ["Dublin", "Europe/Dublin"],
      ["Sydney", "Australia/Sydney"],
      ["Melbourne", "Australia/Melbourne"],
      ["Brisbane", "Australia/Brisbane"],
      ["Perth", "Australia/Perth"],
      ["Auckland", "Pacific/Auckland"],
      ["Bali", "Asia/Makassar"],
      ["Singapore", "Asia/Singapore"],
      ["Bangkok", "Asia/Bangkok"],
      ["Tokyo", "Asia/Tokyo"],
      ["Seoul", "Asia/Seoul"],
      ["Dubai", "Asia/Dubai"],
      ["Mumbai", "Asia/Kolkata"],
      ["Hong Kong", "Asia/Hong_Kong"],
      ["Shanghai", "Asia/Shanghai"],
      ["New York", "America/New_York"],
      ["Los Angeles", "America/Los_Angeles"],
      ["San Francisco", "America/Los_Angeles"],
      ["Chicago", "America/Chicago"],
      ["Denver", "America/Denver"],
      ["Mexico City", "America/Mexico_City"],
      ["Costa Rica", "America/Costa_Rica"],
      ["Nicaragua", "America/Managua"],
      ["Lima", "America/Lima"],
      ["Bogotá", "America/Bogota"],
      ["Buenos Aires", "America/Argentina/Buenos_Aires"],
      ["São Paulo", "America/Sao_Paulo"],
      ["Toronto", "America/Toronto"],
      ["Vancouver", "America/Vancouver"],
      ["UTC", "UTC"]
    ];

    const COLORS = ["#9fd7ff", "#d9b8ff", "#bdf7d2", "#ffd2b7", "#ffb5df", "#c6d4ff"];

    /* ===== core/date-utils.js ===== */

    /* Glass Time — core/date-utils
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- date-utils ---------- */

    function id() {
      return crypto?.randomUUID?.() || "id-" + Math.random().toString(36).slice(2);
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[c]));
    }

    function dateFromISO(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    function addDays(iso, amount) {
      const d = dateFromISO(iso);
      d.setUTCDate(d.getUTCDate() + amount);
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())}`;
    }

    function normalizedHour(hour) {
      return ((hour % 24) + 24) % 24;
    }

    function hour12(hour) {
      const h = normalizedHour(hour);
      return h % 12 || 12;
    }

    function meridiem(hour) {
      return normalizedHour(hour) >= 12 ? "PM" : "AM";
    }

    function compactHourHTML(hour) {
      return `<span class="time-stack"><span class="num">${hour12(hour)}</span><span class="ampm">${meridiem(hour)}</span></span>`;
    }

    function fmtDisplayTime(hour, minute = 0) {
      const suffix = meridiem(hour);
      if (minute === 0) return `${hour12(hour)}${suffix}`;
      return `${hour12(hour)}:${pad(minute)}${suffix}`;
    }

    /* Slots are half-hours: 0..48 (48 = end-of-day 24:00). */
    function slotHour(slot) {
      return Math.floor(slot / 2);
    }

    function slotMinute(slot) {
      return slot % 2 ? 30 : 0;
    }

    function fmtSlot(slot) {
      return fmtDisplayTime(slotHour(slot), slotMinute(slot));
    }

    function clampSlot(slot) {
      return Math.max(0, Math.min(48, Number(slot)));
    }

    function durationText(slots) {
      const mins = slots * 30;
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h && m) return `${h}h ${m}m`;
      if (h) return `${h}h`;
      return `${m}m`;
    }

    function fmtDate(p) {
      return `${p.weekday} ${pad(p.day)}/${pad(p.month)}`;
    }

    function cellWidthPx() {
      const v = getComputedStyle(document.documentElement).getPropertyValue("--cell");
      return parseFloat(v) || 64;
    }

    /* ===== core/timezone-engine.js ===== */

    /* Glass Time — core/timezone-engine
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timezone-engine ---------- */

    function getParts(date, timeZone) {
      const formatter = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        weekday: "short",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      });

      const out = {};
      formatter.formatToParts(date).forEach(part => {
        if (part.type !== "literal") out[part.type] = part.value;
      });

      return {
        weekday: out.weekday,
        year: Number(out.year),
        month: Number(out.month),
        day: Number(out.day),
        hour: Number(out.hour),
        minute: Number(out.minute)
      };
    }

    function todayInZone(timeZone) {
      const p = getParts(new Date(), timeZone);
      return `${p.year}-${pad(p.month)}-${pad(p.day)}`;
    }

    /* DST-safe wall-time -> UTC instant via fixed-point iteration anchored to
       the target wall time. (The previous formula re-subtracted the offset on
       every pass and diverged — e.g. 9AM 25/06 Sydney resolved to 3AM 24/06.) */
    function zonedTimeToUtc(dateISO, hour, minute, timeZone) {
      const [year, month, day] = dateISO.split("-").map(Number);
      const target = Date.UTC(year, month - 1, day, hour, minute, 0);
      let guess = target;

      for (let i = 0; i < 4; i++) {
        const p = getParts(new Date(guess), timeZone);
        const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, 0);
        const diff = localAsUTC - target;
        if (diff === 0) break;
        guess -= diff;
      }

      return new Date(guess);
    }

    function offsetText(date, timeZone) {
      const p = getParts(date, timeZone);
      const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute);
      const mins = Math.round((localAsUTC - date.getTime()) / 60000);
      const sign = mins >= 0 ? "+" : "-";
      const abs = Math.abs(mins);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      return `GMT${sign}${h}${m ? ":" + pad(m) : ""}`;
    }

    /* ===== state/store.js ===== */

    /* Glass Time — state/store
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    const STORAGE_KEY = "glass-time-v1-simple";

    const state = {
      zones: [],
      dateISO: "",
      selectedStartSlot: 18,
      selectedEndSlot: 20,
      cursorSlot: 18,
      calendarMenuOpen: false,
      pickerMode: "edit",
      editingZoneId: null
    };

    const els = {
      selectedSummary: document.getElementById("selectedSummary"),
      selectedDateChip: document.getElementById("selectedDateChip"),
      dateInput: document.getElementById("dateInput"),
      prevBtn: document.getElementById("prevBtn"),
      nextBtn: document.getElementById("nextBtn"),
      nowBtn: document.getElementById("nowBtn"),
      copyBtn: document.getElementById("copyBtn"),
      calendarMenu: document.getElementById("calendarMenu"),
      calendarMenuBtn: document.getElementById("calendarMenuBtn"),
      calendarPopover: document.getElementById("calendarPopover"),
      eventTitleInput: document.getElementById("eventTitleInput"),
      googleBtn: document.getElementById("googleBtn"),
      icsBtn: document.getElementById("icsBtn"),
      resetBtn: document.getElementById("resetBtn"),
      addBtn: document.getElementById("addBtn"),
      baseLabel: document.getElementById("baseLabel"),
      baseDate: document.getElementById("baseDate"),
      durationLabel: document.getElementById("durationLabel"),
      headScroll: document.getElementById("headScroll"),
      hourHeader: document.getElementById("hourHeader"),
      rows: document.getElementById("rows"),
      backdrop: document.getElementById("backdrop"),
      sheet: document.getElementById("sheet"),
      sheetTitle: document.getElementById("sheetTitle"),
      sheetSubtitle: document.getElementById("sheetSubtitle"),
      closeSheetBtn: document.getElementById("closeSheetBtn"),
      zoneSearch: document.getElementById("zoneSearch"),
      zoneList: document.getElementById("zoneList"),
      toast: document.getElementById("toast")
    };

    /* ---------- store / selection model ---------- */

    function normalizedRange() {
      const start = Math.min(state.selectedStartSlot, state.selectedEndSlot);
      const end = Math.max(state.selectedStartSlot, state.selectedEndSlot);
      return {
        start,
        end: Math.max(start + 1, end),
        durationSlots: Math.max(1, end - start)
      };
    }

    function baseZone() {
      return state.zones[0];
    }

    function selectedInstant() {
      const { start } = normalizedRange();
      return zonedTimeToUtc(state.dateISO, slotHour(start), slotMinute(start), baseZone().timeZone);
    }

    function selectedEndInstant() {
      const { end } = normalizedRange();
      return zonedTimeToUtc(state.dateISO, slotHour(end), slotMinute(end), baseZone().timeZone);
    }

    function moveZoneToBase(zoneId, preserveCurrentInstant = true) {
      const index = state.zones.findIndex(z => z.id === zoneId);
      if (index <= 0) return;
      const instant = preserveCurrentInstant ? selectedInstant() : null;
      const duration = normalizedRange().durationSlots;
      const [zone] = state.zones.splice(index, 1);
      state.zones.unshift(zone);
      if (instant) {
        const p = getParts(instant, zone.timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
      }
    }

    /* ===== state/persistence.js ===== */

    /* Glass Time — state/persistence
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- persistence ---------- */

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          zones: state.zones,
          dateISO: state.dateISO,
          selectedStartSlot: state.selectedStartSlot,
          selectedEndSlot: state.selectedEndSlot
        }));
      } catch { /* storage may be unavailable (private mode); ignore */ }
    }

    function load() {
      const fallback = [
        { id: id(), label: "Sydney", timeZone: "Australia/Sydney" },
        { id: id(), label: "Madrid", timeZone: "Europe/Madrid" },
        { id: id(), label: "New York", timeZone: "America/New_York" },
        { id: id(), label: "Bali", timeZone: "Asia/Makassar" }
      ];

      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        state.zones = parsed?.zones?.length ? parsed.zones : fallback;
        state.dateISO = parsed?.dateISO || todayInZone(state.zones[0].timeZone);
        if (Number.isInteger(parsed?.selectedStartSlot) && Number.isInteger(parsed?.selectedEndSlot)) {
          state.selectedStartSlot = clampSlot(parsed.selectedStartSlot);
          state.selectedEndSlot = clampSlot(parsed.selectedEndSlot);
        } else {
          const legacyHour = Number.isInteger(parsed?.selectedHour) ? parsed.selectedHour : 9;
          state.selectedStartSlot = legacyHour * 2;
          state.selectedEndSlot = legacyHour * 2 + 2;
        }
        state.cursorSlot = state.selectedStartSlot;
      } catch {
        state.zones = fallback;
        state.dateISO = todayInZone(state.zones[0].timeZone);
        state.selectedStartSlot = 18;
        state.selectedEndSlot = 20;
        state.cursorSlot = 18;
      }
    }

    /* ===== core/calendar-export.js ===== */

    /* Glass Time — core/calendar-export
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- calendar export ---------- */

    function selectionLines() {
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      return state.zones.map(zone => {
        const start = getParts(startInstant, zone.timeZone);
        const end = getParts(endInstant, zone.timeZone);
        return `${zone.label}: ${fmtDate(start)} ${fmtDisplayTime(start.hour, start.minute)}–${fmtDisplayTime(end.hour, end.minute)} (${zone.timeZone})`;
      });
    }

    function googleDate(date) {
      return date.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
    }

    function calendarTitle() {
      const title = els.eventTitleInput.value.trim();
      if (title) return title;
      const { start, end } = normalizedRange();
      return `Recordatorio · ${baseZone().label} ${fmtSlot(start)}–${fmtSlot(end)}`;
    }

    function calendarDetails() {
      return [
        "Creado desde Glass Time.",
        "",
        "Conversión:",
        ...selectionLines()
      ].join("\n");
    }

    function openGoogleCalendar() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const url = new URL("https://calendar.google.com/calendar/render");
      url.searchParams.set("action", "TEMPLATE");
      url.searchParams.set("text", calendarTitle());
      url.searchParams.set("dates", `${googleDate(start)}/${googleDate(end)}`);
      url.searchParams.set("details", calendarDetails());
      url.searchParams.set("ctz", baseZone().timeZone);
      window.open(url.toString(), "_blank", "noopener,noreferrer");
      showToast("Abriendo Google Calendar.");
    }

    function escapeICS(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\n/g, "\\n");
    }

    function downloadICS() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const stamp = new Date();
      const uid = `${Date.now()}-${Math.random().toString(36).slice(2)}@glass-time`;
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Glass Time//Visual Timezone Converter//ES",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${googleDate(stamp)}`,
        `DTSTART:${googleDate(start)}`,
        `DTEND:${googleDate(end)}`,
        `SUMMARY:${escapeICS(calendarTitle())}`,
        `DESCRIPTION:${escapeICS(calendarDetails())}`,
        "BEGIN:VALARM",
        "ACTION:DISPLAY",
        "DESCRIPTION:Recordatorio",
        "TRIGGER:-PT15M",
        "END:VALARM",
        "END:VEVENT",
        "END:VCALENDAR"
      ].join("\r\n");

      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `glass-time-${state.dateISO}-${pad(slotHour(normalizedRange().start))}${pad(slotMinute(normalizedRange().start))}.ics`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Archivo .ics creado para Calendario/Outlook/Apple.");
    }

    function copySelection() {
      const text = selectionLines().join("\n");
      navigator.clipboard?.writeText(text).then(
        () => showToast("Hora copiada."),
        () => showToast(text)
      );
    }

    /* Glass Time — ui/cursor-controller
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- cursor controller (class-only updates) ---------- */

      document.querySelectorAll(".hour-head.cursor, .cell.cursor").forEach(el => el.classList.remove("cursor"));

    /* ===== ui/timeline-renderer.js ===== */

    /* Glass Time — ui/timeline-renderer
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timeline renderer ----------
       Full render is only used on STRUCTURAL changes (zones, date, base).
       Pointer interactions never call this — they patch the DOM directly. */

    function render() {
      const keepScroll = els.headScroll ? els.headScroll.scrollLeft : 0;
      els.dateInput.value = state.dateISO;
      els.baseLabel.textContent = `Base · ${baseZone().label}`;
      // Always-visible base date (the timeline header date can scroll out of view).
      const baseInstant = zonedTimeToUtc(state.dateISO, 12, 0, baseZone().timeZone);
      els.baseDate.textContent = new Intl.DateTimeFormat("es-ES", {
        weekday: "short", day: "numeric", month: "short", year: "numeric",
        timeZone: baseZone().timeZone
      }).format(baseInstant);
      renderHeader();
      renderRows();
      renderIsland();
      save();
      bindScrollSync();
      restoreScroll(keepScroll);
      updateDayPins();
    }

    /* Keep each scroller's day label pinned to the left edge and showing the date of
       the leftmost visible hour — so it follows the lateral scroll and flips exactly
       when you cross a midnight boundary. */
    function updateDayPins() {
      const cw = cellWidthPx();
      const scrollers = [els.headScroll, ...document.querySelectorAll(".body-scroll")];
      scrollers.forEach(sc => {
        const hoursEl = sc.querySelector(".hours");
        const pin = hoursEl && hoursEl.querySelector(":scope > .day-pin");
        if (!pin) return;
        const left = sc.scrollLeft;
        const h = Math.max(0, Math.min(23, Math.floor(left / cw + 0.001)));
        const ref = hoursEl.querySelector(`[data-hour="${h}"]`);
        const label = ref ? ref.getAttribute("data-date") || "" : "";
        if (pin.textContent !== label) {
          pin.textContent = label;
          pin.classList.remove("flip");
          void pin.offsetWidth; // restart the flash animation
          pin.classList.add("flip");
        }
        pin.style.transform = `translateX(${left}px)`;
      });
    }

    function restoreScroll(left) {
      const scrollers = [els.headScroll, ...document.querySelectorAll(".body-scroll")];
      scrollers.forEach(scroller => {
        scroller.scrollLeft = left;
      });
    }

    function renderHeader() {
      const base = baseZone();
      let html = "";
      let prevISO = null;

      for (let h = 0; h < 24; h++) {
        const instant = zonedTimeToUtc(state.dateISO, h, 0, base.timeZone);
        const p = getParts(instant, base.timeZone);
        const iso = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        const dayStart = h !== 0 && iso !== prevISO; // midnight divider (not at the very edge)
        prevISO = iso;

        html += `
          <div class="hour-head ${h === slotHour(state.cursorSlot) ? "cursor" : ""} ${dayStart ? "day-start" : ""}" data-hour="${h}" data-date="${escapeHTML(fmtDate(p))}">
            <span class="cursor-band" aria-hidden="true"></span>
            <div class="h">${compactHourHTML(p.hour)}</div>
          </div>
        `;
      }

      // Scroll-following day label (sticky to the left edge, updates at day changes).
      html += `<div class="day-pin head-pin" aria-hidden="true"></div>`;
      els.hourHeader.innerHTML = html;
    }

    /* A cell is part of the selection if the range overlaps its 2 half-hour slots.
       The visual fill is drawn by the floating .sel-band; this flag only drives the
       per-cell text emphasis. */
    function cellSelected(h, range) {
      return h * 2 < range.end && h * 2 + 2 > range.start;
    }

    function renderRows() {
      const base = baseZone();
      const now = new Date();
      const baseNow = getParts(now, base.timeZone);
      const isToday = `${baseNow.year}-${pad(baseNow.month)}-${pad(baseNow.day)}` === state.dateISO;
      const range = normalizedRange();

      els.rows.innerHTML = state.zones.map((zone, index) => {
        const current = getParts(now, zone.timeZone);
        const offset = offsetText(now, zone.timeZone);
        const color = COLORS[index % COLORS.length];

        let prevISO = null;
        const cells = Array.from({ length: 24 }, (_, h) => {
          const instant = zonedTimeToUtc(state.dateISO, h, 0, base.timeZone);
          const p = getParts(instant, zone.timeZone);
          const localISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
          const dayShift = localISO < state.dateISO ? "-1" : localISO > state.dateISO ? "+1" : "";
          // Midnight divider where the local day changes; the scroll-following pin
          // shows the date persistently and updates at this boundary.
          const dayStart = h !== 0 && localISO !== prevISO;
          prevISO = localISO;
          const dateLabel = `${fmtDate(p)}${dayShift ? ` · ${dayShift}` : ""}`;
          const selected = cellSelected(h, range);
          const night = p.hour < 6 || p.hour >= 22;
          const morning = p.hour >= 6 && p.hour < 10;
          const work = p.hour >= 10 && p.hour < 18;
          const evening = p.hour >= 18 && p.hour < 22;
          const otherDay = dayShift === "-1" ? "prev-day" : dayShift === "+1" ? "next-day" : "";
          const nowClass = isToday && h === baseNow.hour ? "now" : "";
          const cursor = h === slotHour(state.cursorSlot);

          return `
            <div class="cell ${selected ? "selected" : ""} ${cursor ? "cursor" : ""} ${night ? "night" : ""} ${morning ? "morning" : ""} ${work ? "work" : ""} ${evening ? "evening" : ""} ${otherDay} ${dayStart ? "day-start" : ""} ${nowClass}"
              data-hour="${h}"
              data-date="${escapeHTML(dateLabel)}"
              title="${escapeHTML(zone.label)}: ${fmtDate(p)} ${fmtDisplayTime(p.hour)}">
              <span class="cursor-band" aria-hidden="true"></span>
              <span class="t">${compactHourHTML(p.hour)}</span>
            </div>
          `;
        }).join("");

        return `
          <div class="time-row" data-zone-id="${zone.id}">
            <div class="city-card ${index === 0 ? "anchor" : ""}" data-action="edit-zone" style="--zone-color:${color}">
              <div class="city-glow" style="background:linear-gradient(180deg, ${color}, rgba(255,255,255,.65))"></div>
              <div class="city-main">
                <div class="city-line">
                  <div class="city-name">${escapeHTML(zone.label)}</div>
                  ${index === 0 ? `<span class="base-tag">Base</span>` : ""}
                  <div class="offset">${offset}</div>
                </div>
                <div class="current-time">Ahora · ${fmtDisplayTime(current.hour, current.minute)}</div>
                <div class="zone-name">${escapeHTML(zone.timeZone)}</div>
              </div>
              <div class="city-actions">
                ${index > 0 ? `<button class="mini-btn make-base" title="Hacer base">⌖</button>` : ""}
                ${state.zones.length > 1 ? `<button class="mini-btn remove-zone" title="Eliminar">×</button>` : ""}
              </div>
            </div>
            <div class="scroll body-scroll">
              <div class="hours" style="--sel-start:${range.start}; --sel-len:${range.durationSlots};">
                ${cells}
                <div class="sel-band" aria-hidden="true"></div>
                <div class="day-pin" aria-hidden="true"></div>
              </div>
            </div>
          </div>
        `;
      }).join("");
    }

    function renderIsland() {
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      const base = baseZone();
      const baseStart = getParts(startInstant, base.timeZone);
      const baseEnd = getParts(endInstant, base.timeZone);
      const { durationSlots } = normalizedRange();
      const duration = durationText(durationSlots);
      const baseRange = `${fmtDisplayTime(baseStart.hour, baseStart.minute)}–${fmtDisplayTime(baseEnd.hour, baseEnd.minute)}`;

      els.selectedSummary.textContent = `${duration} seleccionadas`;
      els.selectedDateChip.textContent = `${base.label} · ${fmtDate(baseStart)} · ${baseRange}`;
      els.durationLabel.textContent = `Seleccionado · ${duration}`;
    }

    /* Patch selection styling on the existing DOM — no rebuild, no scroll loss.
       The floating .sel-band glides via a CSS transition when these vars change. */
    function applySelectionDOM() {
      const range = normalizedRange();
      document.querySelectorAll(".body-scroll .hours").forEach(hours => {
        hours.style.setProperty("--sel-start", range.start);
        hours.style.setProperty("--sel-len", range.durationSlots);
      });
      for (let h = 0; h < 24; h++) {
        const selected = cellSelected(h, range);
        document.querySelectorAll(`.body-scroll .cell[data-hour="${h}"]`).forEach(cell => {
          cell.classList.toggle("selected", selected);
        });
      }
    }

    function bindScrollSync() {
      const scrollers = [els.headScroll, ...document.querySelectorAll(".body-scroll")];
      let syncing = false;

      scrollers.forEach(scroller => {
        scroller.onscroll = () => {
          if (syncing) return;
          syncing = true;
          const left = scroller.scrollLeft;
          scrollers.forEach(other => {
            if (other !== scroller) other.scrollLeft = left;
          });
          updateDayPins();
          requestAnimationFrame(() => { syncing = false; });
        };
      });
    }

    function focusHour() {
      const target = Math.max(0, slotHour(normalizedRange().start) * cellWidthPx() - 180);
      els.headScroll.scrollTo({ left: target, behavior: "smooth" });
    }

    /* ===== ui/range-selection.js ===== */

    /* Glass Time — ui/range-selection
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- range selection (pointer interactions) ---------- */

    const DRAG_THRESHOLD = 5; // px before a mouse drag becomes a selection

    const drag = {
      active: false,
      selecting: false,
      anchor: 0,
      startX: 0,
      startY: 0,
      pointerType: "",
      pointerId: null,
      hoursEl: null,
      isHeader: false,
      captureTarget: null
    };

    /* Map an absolute clientX to a half-hour slot using a row's .hours rect,
       so it stays correct regardless of horizontal scroll position. */
    function slotFromClientX(clientX, hoursEl) {
      const rect = hoursEl.getBoundingClientRect();
      const cw = rect.width / 24;
      const rel = clientX - rect.left;
      let hour = Math.floor(rel / cw);
      hour = Math.max(0, Math.min(23, hour));
      const within = (rel - hour * cw) / cw;
      return clampSlot(hour * 2 + (within >= 0.5 ? 1 : 0));
    }

    /* Apply a range to state + DOM without a full render. */
    function liveRange(anchorSlot, currentSlot) {
      const a = clampSlot(anchorSlot);
      const b = clampSlot(currentSlot);
      const start = Math.min(a, b);
      const end = Math.min(48, Math.max(a, b) + 1);
      state.selectedStartSlot = start;
      state.selectedEndSlot = end;
      applySelectionDOM();
      updateCursorDOM(b);
      renderIsland();
    }

    function beginPointer(event, hoursEl, isHeader, captureTarget) {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      let slot;
      if (isHeader) {
        const head = event.target.closest(".hour-head");
        if (!head) return;
        slot = Number(head.dataset.hour) * 2;
      } else {
        slot = slotFromClientX(event.clientX, hoursEl);
      }
      drag.active = true;
      drag.selecting = false;
      drag.anchor = slot;
      drag.startX = event.clientX;
      drag.startY = event.clientY;
      drag.pointerType = event.pointerType;
      drag.pointerId = event.pointerId;
      drag.hoursEl = hoursEl;
      drag.isHeader = isHeader;
      drag.captureTarget = captureTarget;
    }

    function movePointer(event) {
      if (!drag.active) return;
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;

      if (!drag.selecting) {
        if (drag.pointerType === "touch") {
          // A touch that moves is a scroll gesture — abandon selection, let it pan.
          if (Math.hypot(dx, dy) > DRAG_THRESHOLD) drag.active = false;
          return;
        }
        // Mouse / pen: only start selecting after crossing the threshold.
        if (Math.abs(dx) <= DRAG_THRESHOLD && Math.abs(dy) <= DRAG_THRESHOLD) return;
        drag.selecting = true;
        document.body.classList.add("selecting"); // band tracks snappily while dragging
        try { drag.captureTarget?.setPointerCapture?.(drag.pointerId); } catch { /* ignore */ }
      }

      event.preventDefault();
      const cur = slotFromClientX(event.clientX, drag.hoursEl);
      liveRange(drag.anchor, cur);
    }

    function endPointer(event) {
      if (!drag.active) return;
      const wasSelecting = drag.selecting;
      try { drag.captureTarget?.releasePointerCapture?.(drag.pointerId); } catch { /* ignore */ }
      drag.active = false;
      drag.selecting = false;
      document.body.classList.remove("selecting"); // re-enable the eased settle glide

      if (!wasSelecting) {
        // Tap: header => 1h, cell => 30m minimum.
        if (drag.isHeader) liveRange(drag.anchor, drag.anchor + 1);
        else liveRange(drag.anchor, drag.anchor);
      }
      save();
    }

    /* ===== ui/timezone-picker.js ===== */

    /* Glass Time — ui/timezone-picker
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timezone picker (bottom sheet) ---------- */

    function openPicker(mode, zoneId = null) {
      state.pickerMode = mode;
      state.editingZoneId = zoneId;
      const zone = state.zones.find(z => z.id === zoneId);

      els.sheetTitle.textContent = mode === "add" ? "Añadir ciudad" : `Cambiar ${zone?.label || "ciudad"}`;
      els.sheetSubtitle.textContent = mode === "add"
        ? "Elige una zona horaria para añadirla a la timeline."
        : "Toca una opción para reemplazar esta ciudad.";

      els.zoneSearch.value = "";
      renderZoneOptions("");
      els.backdrop.classList.add("open");
      els.sheet.classList.add("open");
      setTimeout(() => els.zoneSearch.focus(), 80);
    }

    function closePicker() {
      els.backdrop.classList.remove("open");
      els.sheet.classList.remove("open");
      state.editingZoneId = null;
    }

    function renderZoneOptions(query) {
      const q = query.trim().toLowerCase();
      const now = new Date();

      const matches = ZONE_LIBRARY.filter(([label, timeZone]) => {
        const text = `${label} ${timeZone}`.toLowerCase();
        return !q || text.includes(q);
      });

      if (!matches.length) {
        els.zoneList.innerHTML = `<div class="zone-empty">Sin resultados para “${escapeHTML(query)}”.</div>`;
        return;
      }

      els.zoneList.innerHTML = matches.map(([label, timeZone]) => {
        const p = getParts(now, timeZone);
        return `
          <button class="zone-option" data-label="${escapeHTML(label)}" data-timezone="${escapeHTML(timeZone)}">
            <span>
              <strong>${escapeHTML(label)}</strong>
              <span>${escapeHTML(timeZone)} · Ahora ${fmtDisplayTime(p.hour, p.minute)}</span>
            </span>
            <em>${offsetText(now, timeZone)}</em>
          </button>
        `;
      }).join("");
    }

    function chooseZone(label, timeZone) {
      if (state.pickerMode === "add") {
        const instant = selectedInstant();
        const duration = normalizedRange().durationSlots;
        const newZone = { id: id(), label, timeZone };
        state.zones.unshift(newZone);
        // New city becomes base — preserve the real-world instant + duration.
        const p = getParts(instant, timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
        showToast(`${label} añadido como base.`);
      } else {
        const zone = state.zones.find(z => z.id === state.editingZoneId);
        if (zone) {
          const editedId = zone.id;
          zone.label = label;
          zone.timeZone = timeZone;
          moveZoneToBase(editedId, true);
          showToast(`${label} seleccionado como base.`);
        }
      }

      closePicker();
      render();
    }

    /* Glass Time — main (misc actions + wiring + bootstrap)

    /* ---------- misc actions ---------- */

    function jumpNow() {
      const base = baseZone();
      const p = getParts(new Date(), base.timeZone);
      state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
      const currentSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
      state.selectedStartSlot = currentSlot;
      state.selectedEndSlot = clampSlot(currentSlot + 2);
      state.cursorSlot = currentSlot;
      render();
      focusHour();

    function reset() {
      localStorage.removeItem(STORAGE_KEY);
      load();
      render();
      focusHour();

    /* ---------- event wiring ---------- */

    function bindEvents() {

      els.copyBtn.addEventListener("click", copySelection);

      els.calendarMenuBtn.addEventListener("click", event => {

      els.resetBtn.addEventListener("click", reset);
      els.addBtn.addEventListener("click", () => openPicker("add"));

      /* --- Timeline pointer interactions (no rerender on movement) --- */

      // Hover cursor band (mouse/pen only — touch must not steal scroll).
      els.hourHeader.addEventListener("pointermove", event => {
        if (drag.active || event.pointerType === "touch") return;
        const head = event.target.closest(".hour-head");
        if (head) updateCursorDOM(Number(head.dataset.hour) * 2);
      });

      els.rows.addEventListener("pointermove", event => {
        if (drag.active || event.pointerType === "touch") return;
        const cell = event.target.closest(".cell");
        if (cell) updateCursorDOM(slotFromClientX(event.clientX, cell.closest(".hours")));
      });

      // Selection start.
      els.hourHeader.addEventListener("pointerdown", event => {
        if (!event.target.closest(".hour-head")) return;
        beginPointer(event, els.hourHeader, true, els.hourHeader);
      });

      els.rows.addEventListener("pointerdown", event => {
        if (event.target.closest(".city-card")) return;
        const cell = event.target.closest(".cell");
        if (!cell) return;
        beginPointer(event, cell.closest(".hours"), false, els.rows);
      });

      document.addEventListener("pointermove", movePointer, { passive: false });
      document.addEventListener("pointerup", endPointer);
      document.addEventListener("pointercancel", endPointer);

      // City card actions (click — not part of the drag system).
      els.rows.addEventListener("click", event => {
        const row = event.target.closest(".time-row");
        if (!row) return;

        if (event.target.closest(".remove-zone")) {
          event.stopPropagation();
          if (state.zones.length <= 1) return;
          state.zones = state.zones.filter(z => z.id !== row.dataset.zoneId);
          render();
          return;
        }

        if (event.target.closest(".make-base")) {
          event.stopPropagation();
          const i = state.zones.findIndex(z => z.id === row.dataset.zoneId);
          if (i > 0) {
            const zone = state.zones[i];
            moveZoneToBase(zone.id, true);
            render();
            showToast(`${zone.label} ahora es la base.`);
          }
          return;
        }

        if (event.target.closest(".cell")) return;

        if (event.target.closest(".city-card")) {
          openPicker("edit", row.dataset.zoneId);
        }
      });

      els.zoneSearch.addEventListener("input", () => renderZoneOptions(els.zoneSearch.value));

      els.zoneList.addEventListener("click", event => {
        const option = event.target.closest(".zone-option");
        if (!option) return;
        chooseZone(option.dataset.label, option.dataset.timezone);
      });

      els.closeSheetBtn.addEventListener("click", closePicker);
      els.backdrop.addEventListener("click", closePicker);

      document.addEventListener("click", event => {
        if (!event.target.closest(".calendar-menu")) setCalendarMenu(false);
      });

      window.addEventListener("keydown", event => {
        if (event.key === "Escape") {
          closePicker();
          setCalendarMenu(false);
        }
        if (event.target.matches("input")) return;

        if (event.key === "ArrowLeft") {
          const duration = normalizedRange().durationSlots;
          const nextStart = Math.max(0, normalizedRange().start - 1);
          state.selectedStartSlot = nextStart;
          state.selectedEndSlot = Math.min(48, nextStart + duration);
          state.cursorSlot = nextStart;
          render();
          focusHour();
        }

        if (event.key === "ArrowRight") {
          const duration = normalizedRange().durationSlots;
          const nextStart = Math.min(47, normalizedRange().start + 1);
          state.selectedStartSlot = nextStart;
          state.selectedEndSlot = Math.min(48, nextStart + duration);
          state.cursorSlot = nextStart;
          render();
          focusHour();
        }
      });
    }

    /* ---------- bootstrap ---------- */

    load();
    bindEvents();
    render();
    setTimeout(focusHour, 160);

  </script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => navigator.serviceWorker.register("./sw.js").catch(() => {}));
    }
  </script>
</body>
</html>
