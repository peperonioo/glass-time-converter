<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glass Time — Visual Timezone Converter</title>
  <style>
    /* Glass Time — styles (inlined into the bundle by src/build.js) */

    :root {
      --bg: #070812;
      --bg2: #10152a;
      --text: rgba(255,255,255,.94);
      --soft: rgba(255,255,255,.66);
      --muted: rgba(255,255,255,.50);
      --line: rgba(255,255,255,.12);
      --glass: rgba(255,255,255,.09);
      --glass2: rgba(255,255,255,.14);
      --ink: rgba(5,8,18,.72);
      --blue: #9fd7ff;
      --violet: #d9b8ff;
      --mint: #bdf7d2;
      --peach: #ffd2b7;
      --pink: #ffb5df;
      --cell: 64px;
      --city: 250px;
      --row: 72px;
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 14% 10%, rgba(115, 198, 255, .32), transparent 31%),
        radial-gradient(circle at 82% 7%, rgba(217, 184, 255, .30), transparent 27%),
        radial-gradient(circle at 76% 88%, rgba(255, 181, 223, .16), transparent 34%),
        linear-gradient(145deg, var(--bg), var(--bg2) 58%, #171b35);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 22%, transparent 70%, rgba(255,255,255,.04)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 42%);
      mix-blend-mode: overlay;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1420px, calc(100vw - 24px));
      margin: 0 auto;
      /* Keep the logo clear of the notch / Dynamic Island (viewport-fit=cover). */
      padding: calc(18px + env(safe-area-inset-top)) 0 34px;
      position: relative;
      z-index: 1;
    }

    .nav {
      position: sticky;
      top: calc(12px + env(safe-area-inset-top));
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.95), transparent 18%),
        linear-gradient(135deg, var(--blue), var(--violet) 48%, var(--pink));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.62),
        0 20px 70px rgba(159,215,255,.22);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      letter-spacing: -.055em;
      line-height: .95;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--soft);
      font-size: 13px;
    }

    .island {
      width: min(610px, 52vw);
      min-height: 58px;
      padding: 10px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        rgba(3, 5, 12, .72);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 20px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
    }

    .island small {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .island strong {
      display: block;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.05;
      letter-spacing: -.055em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .island .chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.11);
      color: rgba(255,255,255,.78);
      font-size: 12px;
      flex: 0 0 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48%;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .glass-btn {
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(20px);
      color: rgba(255,255,255,.86);
      transition: transform .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease);
    }

    .glass-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.24);
    }

    .calendar-menu {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .calendar-plus {
      padding-left: 13px;
      padding-right: 15px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.17), rgba(255,255,255,.075)),
        rgba(3,5,12,.55);
      border-color: rgba(255,255,255,.18);
    }

    .calendar-popover {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: min(330px, calc(100vw - 32px));
      padding: 8px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.07)),
        rgba(5, 7, 15, .86);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 26px 80px rgba(0,0,0,.46);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
      opacity: 0;
      transform: translateY(-6px) scale(.98);
      pointer-events: none;
      transition: opacity .18s var(--ease), transform .18s var(--ease);
      z-index: 70;
    }

    .calendar-title-field {
      padding: 8px 8px 6px;
    }

    .calendar-title-field label {
      display: block;
      margin: 0 0 7px 4px;
      color: var(--soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .calendar-title-field input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      background: rgba(0,0,0,.22);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .calendar-menu.open .calendar-popover {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .calendar-choice {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      padding: 11px;
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      transition: background .16s var(--ease), transform .16s var(--ease);
    }

    .calendar-choice:hover {
      background: rgba(255,255,255,.11);
      transform: translateY(-1px);
    }

    .choice-icon {
      width: 38px;
      height: 38px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(159,215,255,.32), rgba(217,184,255,.25)),
        rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 800;
    }

    .calendar-choice strong {
      display: block;
      font-size: 14px;
      letter-spacing: -.02em;
    }

    .calendar-choice em {
      display: block;
      margin-top: 3px;
      font-style: normal;
      color: var(--soft);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055)),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 22px 65px rgba(0,0,0,.18);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    .date-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(3,5,12,.34);
      border: 1px solid rgba(255,255,255,.12);
    }

    .date-pill span {
      color: var(--soft);
      font-size: 13px;
    }

    input[type="date"] {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      color-scheme: dark;
      min-width: 132px;
    }

    .hint {
      color: var(--soft);
      font-size: 13px;
      text-align: center;
    }

    .right-tools {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .board {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.045)),
        rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 24px 80px rgba(0,0,0,.24);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      /* No native text selection / long-press magnifier on the timeline. */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* While selecting on touch, lock the scrollers so the drag selects (not pans). */
    body.selecting .scroll {
      touch-action: none;
    }

    .time-scroll { position: relative; }

    .grid { width: max-content; }

    .row {
      display: flex;
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .row:last-child { border-bottom: 0; }

    /* Sticky city column — pinned to the left while the hours scroll natively.
       Needs an opaque base so scrolled cells don't bleed through it. */
    .city-card {
      position: sticky;
      left: 0;
      z-index: 5;
      flex: 0 0 var(--city);
      width: var(--city);
    }

    .scroll {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.28) transparent;
      /* Keep horizontal pan natural on trackpad / touch; never lock vertical page scroll */
      touch-action: pan-x pan-y;
      overscroll-behavior-x: contain;
    }

    .hours {
      position: relative;
      flex: 0 0 auto;
      display: grid;
      /* 3-day window: 72 hour columns (yesterday · base date · tomorrow). */
      grid-template-columns: repeat(72, var(--cell));
      width: calc(72 * var(--cell));
    }

    .time-stack {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      line-height: .9;
      gap: 5px;
    }

    .time-stack .num {
      font-size: 24px;
      font-weight: 820;
      letter-spacing: -.07em;
    }

    .time-stack .ampm {
      font-size: 10px;
      font-weight: 760;
      letter-spacing: .10em;
      color: rgba(255,255,255,.48);
    }

    .cell.selected .time-stack .ampm {
      color: rgba(255,255,255,.82);
    }

    /* Soft full-cell cursor band — sits behind the time number, never blocks text */
    .cursor-band {
      position: absolute;
      z-index: 1;
      inset: 3px 3px;
      border-radius: 18px;
      opacity: 0;
      transform: scaleX(.9);
      background:
        linear-gradient(180deg, rgba(159,215,255,.14), rgba(217,184,255,.09)),
        rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.26),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 0 26px rgba(159,215,255,.22);
      transition: opacity .14s var(--ease), transform .14s var(--ease), border-color .14s var(--ease);
      pointer-events: none;
      /* NOTE: no will-change here — there is one cursor-band per cell (~144),
         and will-change would force ~144 GPU layers and wreck mobile scroll. */
    }

    .cell.cursor .cursor-band {
      opacity: 1;
      transform: scaleX(1);
    }

    .cell.cursor {
      background-image: linear-gradient(180deg, rgba(159,215,255,.045), rgba(217,184,255,.035));
    }

    .cell.cursor .time-stack .ampm {
      color: rgba(255,255,255,.86);
    }

    .city-card {
      position: sticky;
      min-height: var(--row);
      padding: 10px 12px;
      border-right: 1px solid var(--line);
      /* Fully opaque: scrolled cells must never ghost through the sticky column. */
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.015)),
        rgb(15, 19, 33);
      display: flex;
      align-items: center;
      gap: 11px;
      transition: background .18s var(--ease);
      cursor: pointer;
      user-select: none;
    }

    .city-card:hover {
      background:
        linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.04)),
        rgb(15, 19, 33);
    }

    .city-card.anchor {
      background:
        linear-gradient(90deg, rgba(159,215,255,.16), rgba(217,184,255,.07)),
        rgb(15, 19, 33);
    }

    .city-glow {
      width: 12px;
      align-self: stretch;
      min-height: 44px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue), var(--violet));
      box-shadow: 0 0 24px rgba(159,215,255,.24);
      flex: 0 0 auto;
      opacity: .92;
    }

    .city-main {
      min-width: 0;
      flex: 1;
    }

    .city-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .city-name {
      font-size: 16px;
      font-weight: 780;
      letter-spacing: -.025em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .base-tag {
      flex: 0 0 auto;
      font-size: 9px;
      font-weight: 820;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(8,12,24,.9);
      background: linear-gradient(180deg, var(--blue), var(--violet));
      padding: 2px 7px;
      border-radius: 999px;
    }

    .offset {
      color: var(--muted);
      font-size: 11px;
      flex: 0 0 auto;
      margin-left: auto;
    }

    /* Hours difference vs the base city, e.g. "+8h" — the number people
       actually think in. Base row shows the Base tag instead. */
    .rel-offset {
      flex: 0 0 auto;
      margin-left: auto;
      font-size: 10px;
      font-weight: 740;
      letter-spacing: .01em;
      color: rgba(159,215,255,.92);
      background: rgba(159,215,255,.10);
      border: 1px solid rgba(159,215,255,.20);
      padding: 2px 6px;
      border-radius: 999px;
    }

    .rel-offset + .offset {
      margin-left: 8px;
    }

    /* Row reordering: lifted row follows the pointer, the rest glide aside. */
    body.reordering {
      cursor: grabbing;
      user-select: none;
      -webkit-user-select: none;
    }

    body.reordering #rows .row {
      transition: transform .18s var(--ease);
    }

    #rows .row.lifting {
      transition: none;
      position: relative;
      z-index: 30;
      background: rgba(18, 24, 44, .92);
      box-shadow: 0 16px 44px rgba(0,0,0,.45);
      outline: 1px solid rgba(255,255,255,.16);
      border-radius: 14px;
    }

    .current-time {
      margin-top: 5px;
      color: rgba(255,255,255,.82);
      font-size: 13px;
      letter-spacing: -.01em;
    }

    /* IANA zone — kept for reference but visually quietest line. */
    .zone-name {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10.5px;
      letter-spacing: .005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Actions overlay on the right and reveal on hover, so the city name keeps
       the full row width and stays prominent. */
    .city-actions {
      position: absolute;
      right: 10px;
      top: 50%;
      display: flex;
      gap: 5px;
      padding: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(10,12,22,.78) 26%);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(6px);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }

    .city-card:hover .city-actions,
    .city-card:focus-within .city-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
    }

    .mini-btn {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.66);
      transition: background .18s var(--ease), color .18s var(--ease), transform .18s var(--ease);
    }

    .mini-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      color: var(--text);
    }

    .cell {
      height: var(--row);
      border-right: 1px solid rgba(255,255,255,.075);
      display: grid;
      place-items: center;
      position: relative;
      color: rgba(255,255,255,.80);
      cursor: pointer;
      user-select: none;
      transition: background .14s var(--ease), color .14s var(--ease);
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 9px 5px;
      border-radius: 17px;
      background: transparent;
      transform: scale(.93);
      transition: background .16s var(--ease), transform .16s var(--ease), box-shadow .16s var(--ease);
    }

    .cell:hover::before {
      background: rgba(255,255,255,.10);
      transform: scale(1);
    }

    /* One continuous selection band per row that glides between half-hour
       slots instead of painting cell-by-cell. --sel-start / --sel-len are set
       (in half-hour units) on the parent .hours element. */
    .sel-band {
      position: absolute;
      z-index: 0;
      top: 8px;
      bottom: 8px;
      left: calc(var(--sel-start, 18) * (var(--cell) / 2) + 4px);
      width: calc(var(--sel-len, 2) * (var(--cell) / 2) - 8px);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(159,215,255,.50), rgba(217,184,255,.36));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.50),
        inset 0 -1px 0 rgba(255,255,255,.12),
        0 14px 38px rgba(159,215,255,.20);
      pointer-events: none;
      transform: translateZ(0);
      transition:
        left .42s var(--ease),
        width .42s var(--ease);
      will-change: left, width;
      animation: gt-band-breathe 4.5s ease-in-out infinite;
    }

    /* Soft top sheen for depth. */
    .sel-band::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.22), transparent 46%);
      pointer-events: none;
    }

    /* Snappier tracking while actively dragging a selection. */
    body.selecting .sel-band {
      transition-duration: .12s;
      animation: none;
    }

    .cell.selected .time-stack .num {
      color: #fff;
    }

    .cell.cursor .cursor-band {
      border-color: rgba(255,255,255,.45);
      background:
        linear-gradient(180deg, rgba(159,215,255,.16), rgba(217,184,255,.11)),
        rgba(255,255,255,.05);
    }

    .cell .t {
      position: relative;
      z-index: 1;
    }

    .cell .time-stack .num {
      font-size: 21px;
    }

    .cell .time-stack .ampm {
      font-size: 9px;
    }

    /* Real daylight map — tints come from the actual sun altitude per city.
       night (below horizon) -> twilight -> golden hour -> full day. */
    .cell.sun-night {
      color: rgba(255,255,255,.34);
      background: rgba(3,6,16,.46);
    }

    .cell.sun-twilight {
      color: rgba(255,255,255,.62);
      background: rgba(120,120,200,.13);
    }

    .cell.sun-golden {
      background: rgba(255,176,92,.16);
    }

    .cell.sun-day {
      background: rgba(150,232,185,.10);
    }

    /* "Other day" veil: cells on the previous/next calendar day get a faint
       cool/warm tint so each day reads as its own block. */
    .cell.prev-day::after,
    .cell.next-day::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .cell.prev-day::after { background: rgba(96,128,210,.12); }
    .cell.next-day::after { background: rgba(255,176,120,.12); }
    .cell.prev-day .t,
    .cell.next-day .t { opacity: .72; }

    /* Day boundary: a clear, slightly accented midnight divider. */
    .cell.day-start {
      border-left: 2px solid rgba(159,215,255,.42);
    }

    /* Scroll-following day label: pinned to the left edge of the scroller,
       flips to the new date exactly when a midnight boundary scrolls past. */
    .day-pin {
      position: absolute;
      z-index: 4;
      top: 3px;
      left: 5px;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(6,9,18,.62);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.62);
      font-size: 8px;
      font-weight: 760;
      letter-spacing: .02em;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .day-pin.flip {
      animation: gt-pin-flash .26s var(--ease);
    }

    @keyframes gt-pin-flash {
      0%   { opacity: .15; }
      100% { opacity: 1; }
    }

    .cell.now {
      box-shadow: inset 2px 0 0 rgba(255,255,255,.72);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.28);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s var(--ease);
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 90;
      width: min(760px, calc(100vw - 24px));
      max-height: min(720px, calc(100vh - 34px));
      transform: translateX(-50%) translateY(24px) scale(.98);
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.075)),
        rgba(8, 10, 20, .82);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.26),
        0 28px 90px rgba(0,0,0,.48);
      backdrop-filter: blur(34px) saturate(175%);
      -webkit-backdrop-filter: blur(34px) saturate(175%);
      overflow: hidden;
      transition: transform .24s var(--ease), opacity .24s var(--ease);
    }

    .sheet.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .grabber {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.25);
      margin: 10px auto 4px;
    }

    .sheet-top {
      padding: 12px 16px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .sheet-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.045em;
    }

    .sheet-title p {
      margin: 5px 0 0;
      color: var(--soft);
      font-size: 13px;
    }

    .search {
      padding: 0 16px 12px;
    }

    .search input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      background: rgba(0,0,0,.22);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .zone-list {
      overflow: auto;
      padding: 0 10px 12px;
    }

    .zone-option {
      width: 100%;
      text-align: left;
      padding: 13px 12px;
      margin: 4px 0;
      border-radius: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: transparent;
      transition: background .16s var(--ease);
    }

    .zone-option:hover {
      background: rgba(255,255,255,.10);
    }

    .zone-option strong {
      display: block;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .zone-option span {
      display: block;
      margin-top: 4px;
      color: var(--soft);
      font-size: 12px;
    }

    .zone-option em {
      align-self: center;
      font-style: normal;
      color: var(--muted);
      font-size: 12px;
    }

    .zone-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      z-index: 110;
      right: 16px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(4,7,16,.76);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.84);
      box-shadow: 0 18px 60px rgba(0,0,0,.36);
      backdrop-filter: blur(24px);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s var(--ease), transform .2s var(--ease);
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      :root {
        --city: 210px;
        --cell: 58px;
      }

      .nav,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .brand,
      .actions,
      .date-wrap,
      .right-tools {
        justify-content: center;
        flex-wrap: wrap;
      }

      .brand {
        text-align: center;
      }

      .island {
        width: 100%;
      }

      .hint {
        order: -1;
      }
    }

    @media (max-width: 620px) {
      :root {
        --city: 118px;
        --cell: 52px;
        --row: 66px;
      }

      .app {
        width: calc(100vw - 12px);
        padding: calc(8px + env(safe-area-inset-top)) 0 24px;
      }

      /* Mobile performance: keep ambient effects but stop the continuous
         repaints that drag scrolling FPS down. !important beats the later,
         higher-specificity animation definitions. */
      .aurora { filter: blur(46px) saturate(130%); }
      .aurora span { animation: none !important; will-change: auto !important; }  /* static => no extra GPU layers */
      .sel-band { animation: none !important; will-change: auto; }
      .sel-band::before { animation: none !important; opacity: .3; }
      .logo { animation: none !important; }
      .scroll { -webkit-overflow-scrolling: touch; }

      /* The board is the scroll container — a live backdrop-filter on it forces
         Safari to re-rasterize the blur every scroll frame. Drop it on mobile and
         use a more opaque glass base instead (still looks frosted, scrolls smooth). */
      .board {
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
        background:
          linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.03)),
          rgba(12, 16, 30, .72);
      }

      .island,
      .toolbar,
      .calendar-popover,
      .sheet {
        backdrop-filter: blur(14px) saturate(135%);
        -webkit-backdrop-filter: blur(14px) saturate(135%);
      }

      /* Compact the whole header chrome so the timeline appears much higher. */
      .nav {
        gap: 8px;
        margin-bottom: 10px;
      }

      .brand { gap: 9px; }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 13px;
      }

      h1 { font-size: 22px; }

      .brand p { display: none; }

      .island {
        min-height: 0;
        padding: 8px 15px;
        border-radius: 20px;
      }

      .island small { display: none; }

      .island strong { font-size: 19px; }

      .island .chip { display: none; }

      .actions { gap: 6px; }

      .actions .glass-btn { padding: 9px 12px; font-size: 13px; }

      #copyBtn { display: none; } /* Compartir lo cubre en móvil */

      .toolbar {
        padding: 9px;
        margin-bottom: 10px;
        border-radius: 22px;
        gap: 8px;
      }

      .hint { display: none; }

      .date-wrap {
        flex-wrap: nowrap;
        gap: 6px;
        justify-content: center;
      }

      .date-pill { padding: 7px 10px; }

      .date-pill span { display: none; }

      .date-wrap .glass-btn { padding: 8px 11px; }

      .right-tools { gap: 6px; }

      .right-tools .glass-btn { padding: 9px 12px; }

      .city-card {
        padding: 9px 8px;
        gap: 8px;
      }

      .city-glow {
        display: none;
      }

      .city-name {
        font-size: 13px;
        max-width: 100%;
      }

      /* The left panel already says "Base · …", so free the row for the name. */
      .base-tag { display: none; }

      /* Corner badge keeps the city name on a full line: non-base rows show the
         hours-vs-base chip (the number people think in); the base row keeps its
         GMT. Full GMT for every zone stays visible in the picker. */
      .city-line { padding-right: 40px; }

      .offset { display: none; }

      #rows .row:first-child .offset {
        display: block;
        position: absolute;
        top: 9px;
        right: 9px;
        margin: 0;
        font-size: 9px;
      }

      .rel-offset {
        position: absolute;
        top: 9px;
        right: 9px;
        margin: 0;
        font-size: 9px;
        padding: 1px 5px;
      }
      .current-time, .zone-name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      .zone-name {
        font-size: 10px;
      }

      .current-time {
        font-size: 11px;
      }

      .city-actions {
        display: none;
      }

      .time-stack .num {
        font-size: 21px;
      }

      .cell .time-stack .num {
        font-size: 19px;
      }

      .cell .time-stack .ampm {
        font-size: 8px;
      }

      .sheet {
        width: calc(100vw - 12px);
        border-radius: 30px;
      }
    }

    /* ---------- motion / polish ---------- */

    @keyframes gt-rise {
      from { opacity: 0; transform: translateY(16px) scale(.99); }
      to   { opacity: 1; transform: none; }
    }

    @keyframes gt-band-breathe {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.50), inset 0 -1px 0 rgba(255,255,255,.12), 0 14px 38px rgba(159,215,255,.18); }
      50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,.50), inset 0 -1px 0 rgba(255,255,255,.12), 0 18px 50px rgba(159,215,255,.32); }
    }

    @keyframes gt-now-pulse {
      0%, 100% { opacity: .55; }
      50%      { opacity: 1; }
    }

    .nav     { animation: gt-rise .5s var(--ease) both; }
    .toolbar { animation: gt-rise .55s .06s var(--ease) both; }
    .board   { animation: gt-rise .6s .12s var(--ease) both; }

    /* Ambient mood veil — tints the whole scene by the sun phase at the selected
       time (warm at golden hour, deep at night). Crossfades smoothly. */
    .mood-veil {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: transparent;
      transition: background-color 1.4s var(--ease);
    }
    body[data-mood="day"]      .mood-veil { background-color: rgba(150,200,255,.05); }
    body[data-mood="golden"]   .mood-veil { background-color: rgba(255,150,60,.11); }
    body[data-mood="twilight"] .mood-veil { background-color: rgba(120,90,210,.13); }
    body[data-mood="night"]    .mood-veil { background-color: rgba(4,8,26,.42); }

    /* Ambient living aurora — slow drifting light behind the glass. */
    .aurora {
      position: fixed;
      inset: -15%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      filter: blur(70px) saturate(140%);
    }
    .aurora span {
      position: absolute;
      display: block;
      border-radius: 50%;
      opacity: .42;
      mix-blend-mode: screen;
      will-change: transform;
    }
    .aurora span:nth-child(1) {
      width: 48vw; height: 48vw; left: 0%; top: -8%;
      background: radial-gradient(circle, rgba(115,198,255,.85), transparent 68%);
      animation: gt-drift1 28s ease-in-out infinite;
    }
    .aurora span:nth-child(2) {
      width: 44vw; height: 44vw; right: -4%; top: -4%;
      background: radial-gradient(circle, rgba(217,184,255,.8), transparent 68%);
      animation: gt-drift2 34s ease-in-out infinite;
    }
    .aurora span:nth-child(3) {
      width: 54vw; height: 54vw; left: 28%; bottom: -22%;
      background: radial-gradient(circle, rgba(255,181,223,.6), transparent 70%);
      animation: gt-drift3 40s ease-in-out infinite;
    }
    @keyframes gt-drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(7vw, 5vh) scale(1.14); }
    }
    @keyframes gt-drift2 {
      0%, 100% { transform: translate(0, 0) scale(1.05); }
      50%      { transform: translate(-6vw, 6vh) scale(.92); }
    }
    @keyframes gt-drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-5vw, -6vh) scale(1.16); }
    }

    /* Liquid light sweep across the selection band. */
    .sel-band::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.45) 50%, transparent 62%);
      background-size: 240% 100%;
      mix-blend-mode: screen;
      opacity: .7;
      animation: gt-shimmer 3.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes gt-shimmer {
      0%   { background-position: 130% 0; }
      100% { background-position: -30% 0; }
    }
    body.selecting .sel-band::before { animation: none; }

    /* Gently floating logo. */
    .logo {
      animation: gt-float 6s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes gt-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-3px) rotate(1.2deg); }
    }

    /* Staggered row entrance — only during the initial mount window. */
    .board.intro #rows .row { animation: gt-rise .55s var(--ease) both; }
    .board.intro #rows .row:nth-child(1) { animation-delay: .14s; }
    .board.intro #rows .row:nth-child(2) { animation-delay: .20s; }
    .board.intro #rows .row:nth-child(3) { animation-delay: .26s; }
    .board.intro #rows .row:nth-child(4) { animation-delay: .32s; }
    .board.intro #rows .row:nth-child(5) { animation-delay: .38s; }
    .board.intro #rows .row:nth-child(n+6) { animation-delay: .44s; }

    /* Gentle living "now" marker. */
    .cell.now {
      box-shadow: none;
    }
    .cell.now::before {
      box-shadow: inset 2px 0 0 rgba(255,255,255,.8);
      animation: gt-now-pulse 2.6s ease-in-out infinite;
    }

    /* Tactile press feedback. */
    .glass-btn:active { transform: translateY(0) scale(.96); }
    .mini-btn:active  { transform: scale(.9); }
    .calendar-choice:active,
    .zone-option:active { transform: scale(.985); }
    .cell:active::before {
      background: rgba(255,255,255,.16);
      transform: scale(.95);
    }
    .city-card:active { transform: scale(.992); }

    /* Sheet / popover content easing in. */
    .sheet.open .zone-list,
    .calendar-menu.open .calendar-popover > * {
      animation: gt-rise .32s var(--ease) both;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .001s !important;
        animation-duration: .001s !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    /* ---------- onboarding: coach marks + iOS install hint ---------- */

    .coach {
      position: fixed;
      z-index: 140;
      max-width: min(320px, calc(100vw - 24px));
      padding: 11px 14px;
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.07)),
        rgba(6, 9, 18, .88);
      border: 1px solid rgba(159,215,255,.35);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 18px 60px rgba(0,0,0,.5),
        0 0 30px rgba(159,215,255,.18);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,.9);
      opacity: 0;
      transform: translateY(6px) scale(.97);
      transition: opacity .24s var(--ease), transform .24s var(--ease);
      cursor: pointer;
    }

    .coach.show {
      opacity: 1;
      transform: none;
    }

    .coach b { color: var(--blue, #9fd7ff); color: #9fd7ff; }

    .coach em {
      display: block;
      margin-top: 5px;
      font-style: normal;
      font-size: 10px;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: rgba(255,255,255,.4);
    }

    .install-hint {
      position: fixed;
      z-index: 130;
      left: 50%;
      bottom: max(16px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(12px);
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: calc(100vw - 24px);
      padding: 11px 12px 11px 15px;
      border-radius: 999px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06)),
        rgba(6, 9, 18, .9);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 18px 60px rgba(0,0,0,.5);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      font-size: 12.5px;
      color: rgba(255,255,255,.88);
      opacity: 0;
      transition: opacity .28s var(--ease), transform .28s var(--ease);
    }

    .install-hint.show {
      opacity: 1;
      transform: translateX(-50%);
    }

    .install-hint svg {
      width: 12px;
      height: 15px;
      vertical-align: -2px;
      color: #9fd7ff;
    }

    .install-hint b { color: #9fd7ff; font-weight: 700; }

    .install-hint button {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,.1);
      color: rgba(255,255,255,.7);
      font-size: 15px;
      line-height: 1;
      flex: 0 0 auto;
    }

    /* ---------- picker: recientes ---------- */

    .zone-group-label {
      padding: 10px 14px 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: rgba(255,255,255,.42);
    }

          </div>

    <section class="toolbar">

          <input id="dateInput" type="date" />
        </div>
        <button class="glass-btn" id="nextBtn">Día →</button>
      </div>

      <div class="hint">Arrastra para crear un rango · toca una ciudad para cambiarla.</div>

      <div class="right-tools">
