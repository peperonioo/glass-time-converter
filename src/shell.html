<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glass Time — Visual Timezone Converter</title>
  <style>
/*__GLASS_TIME_STYLES__*/
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="mood-veil" aria-hidden="true"></div>
  <main class="app">
    <header class="nav">
      <section class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Glass Time</h1>
          <p>Conversor visual de fecha y hora por zonas horarias.</p>
        </div>
      </section>

      <section class="island" aria-live="polite">
        <div>
          <small>Hora seleccionada</small>
          <strong id="selectedSummary">—</strong>
        </div>
        <div class="chip" id="selectedDateChip">—</div>
      </section>

      <section class="actions">
        <button class="glass-btn" id="nowBtn">Ahora</button>
        <button class="glass-btn" id="copyBtn">Copiar</button>
        <button class="glass-btn" id="shareBtn">Compartir</button>
        <div class="calendar-menu" id="calendarMenu">
          <button class="glass-btn calendar-plus" id="calendarMenuBtn" aria-expanded="false">＋ Guardar</button>
          <div class="calendar-popover" id="calendarPopover" role="menu">
            <div class="calendar-title-field">
              <label for="eventTitleInput">Título</label>
              <input id="eventTitleInput" type="text" placeholder="Ej. Weekly sync, llamada, recordatorio..." />
            </div>
            <button class="calendar-choice" id="googleBtn" role="menuitem">
              <span class="choice-icon">G</span>
              <span>
                <strong>Google Calendar</strong>
                <em>Abre el evento listo para guardar</em>
              </span>
            </button>
            <button class="calendar-choice" id="icsBtn" role="menuitem">
              <span class="choice-icon">⌁</span>
              <span>
                <strong>Calendario nativo</strong>
                <em>Apple Calendar / Outlook / .ics</em>
              </span>
            </button>
          </div>
        </div>
      </section>
    </header>

    <section class="toolbar">
      <div class="date-wrap">
        <button class="glass-btn" id="prevBtn">← Día</button>
        <div class="date-pill">
          <span>Fecha base</span>
          <input id="dateInput" type="date" />
        </div>
        <button class="glass-btn" id="nextBtn">Día →</button>
      </div>

      <div class="hint">Arrastra para crear un rango · toca una ciudad para cambiarla.</div>

      <div class="right-tools">
        <button class="glass-btn" id="addBtn">+ Ciudad</button>
        <button class="glass-btn" id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="board" aria-label="Conversor visual">
      <!-- ONE horizontal scroller; the city column is position:sticky so it stays
           pinned while the hours scroll natively (no JS sync = smooth). -->
      <div class="scroll time-scroll" id="timeScroll">
        <div class="grid">
          <div id="rows"></div>
        </div>
      </div>
    </section>
  </main>

  <div class="sheet-backdrop" id="backdrop"></div>

  <section class="sheet" id="sheet" aria-modal="true" role="dialog">
    <div class="grabber"></div>
    <div class="sheet-top">
      <div class="sheet-title">
        <h2 id="sheetTitle">Cambiar timezone</h2>
        <p id="sheetSubtitle">Busca una ciudad o zona horaria.</p>
      </div>
      <button class="glass-btn" id="closeSheetBtn">Cerrar</button>
    </div>
    <div class="search">
      <input id="zoneSearch" type="search" placeholder="Buscar: Madrid, Sydney, UTC, Bali..." />
    </div>
    <div class="zone-list" id="zoneList"></div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
/*__GLASS_TIME_BUNDLE__*/
  </script>
</body>
</html>
