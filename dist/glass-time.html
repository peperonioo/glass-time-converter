<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Glass Time — Visual Timezone Converter</title>
  <style>
    :root {
      --bg: #070812;
      --bg2: #10152a;
      --text: rgba(255,255,255,.94);
      --soft: rgba(255,255,255,.66);
      --muted: rgba(255,255,255,.42);
      --line: rgba(255,255,255,.12);
      --glass: rgba(255,255,255,.09);
      --glass2: rgba(255,255,255,.14);
      --ink: rgba(5,8,18,.72);
      --blue: #9fd7ff;
      --violet: #d9b8ff;
      --mint: #bdf7d2;
      --peach: #ffd2b7;
      --pink: #ffb5df;
      --cell: 64px;
      --city: 250px;
      --row: 72px;
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --ease: cubic-bezier(.2,.8,.2,1);
      --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Inter", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
      font-family: var(--font);
      color: var(--text);
      background:
        radial-gradient(circle at 14% 10%, rgba(115, 198, 255, .32), transparent 31%),
        radial-gradient(circle at 82% 7%, rgba(217, 184, 255, .30), transparent 27%),
        radial-gradient(circle at 76% 88%, rgba(255, 181, 223, .16), transparent 34%),
        linear-gradient(145deg, var(--bg), var(--bg2) 58%, #171b35);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(180deg, rgba(255,255,255,.08), transparent 22%, transparent 70%, rgba(255,255,255,.04)),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 42%);
      mix-blend-mode: overlay;
    }

    button,
    input {
      font: inherit;
    }

    button {
      border: 0;
      color: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      width: min(1420px, calc(100vw - 24px));
      margin: 0 auto;
      padding: 18px 0 34px;
      position: relative;
      z-index: 1;
    }

    .nav {
      position: sticky;
      top: 12px;
      z-index: 30;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 14px;
      align-items: center;
      margin-bottom: 18px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .logo {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 32% 25%, rgba(255,255,255,.95), transparent 18%),
        linear-gradient(135deg, var(--blue), var(--violet) 48%, var(--pink));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.62),
        0 20px 70px rgba(159,215,255,.22);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 2.6vw, 34px);
      letter-spacing: -.055em;
      line-height: .95;
    }

    .brand p {
      margin: 6px 0 0;
      color: var(--soft);
      font-size: 13px;
    }

    .island {
      width: min(610px, 52vw);
      min-height: 58px;
      padding: 10px 16px;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06)),
        rgba(3, 5, 12, .72);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.24),
        0 20px 70px rgba(0,0,0,.38);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
    }

    .island small {
      display: block;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .14em;
      font-size: 10px;
      margin-bottom: 3px;
    }

    .island strong {
      display: block;
      font-size: clamp(18px, 2.4vw, 28px);
      line-height: 1.05;
      letter-spacing: -.055em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .island .chip {
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.11);
      color: rgba(255,255,255,.78);
      font-size: 12px;
      flex: 0 0 auto;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 48%;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .glass-btn {
      padding: 11px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.16);
      backdrop-filter: blur(20px);
      color: rgba(255,255,255,.86);
      transition: transform .18s var(--ease), background .18s var(--ease), border-color .18s var(--ease);
    }

    .glass-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.16);
      border-color: rgba(255,255,255,.24);
    }

    .calendar-menu {
      position: relative;
      display: inline-flex;
      align-items: center;
    }

    .calendar-plus {
      padding-left: 13px;
      padding-right: 15px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.17), rgba(255,255,255,.075)),
        rgba(3,5,12,.55);
      border-color: rgba(255,255,255,.18);
    }

    .calendar-popover {
      position: absolute;
      right: 0;
      top: calc(100% + 10px);
      width: min(330px, calc(100vw - 32px));
      padding: 8px;
      border-radius: 26px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.07)),
        rgba(5, 7, 15, .86);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.22),
        0 26px 80px rgba(0,0,0,.46);
      backdrop-filter: blur(30px) saturate(170%);
      -webkit-backdrop-filter: blur(30px) saturate(170%);
      opacity: 0;
      transform: translateY(-6px) scale(.98);
      pointer-events: none;
      transition: opacity .18s var(--ease), transform .18s var(--ease);
      z-index: 70;
    }

    .calendar-title-field {
      padding: 8px 8px 6px;
    }

    .calendar-title-field label {
      display: block;
      margin: 0 0 7px 4px;
      color: var(--soft);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: .11em;
    }

    .calendar-title-field input {
      width: 100%;
      padding: 12px 13px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      background: rgba(0,0,0,.22);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .calendar-menu.open .calendar-popover {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .calendar-choice {
      width: 100%;
      display: grid;
      grid-template-columns: 38px 1fr;
      gap: 10px;
      align-items: center;
      text-align: left;
      padding: 11px;
      border-radius: 20px;
      background: transparent;
      color: var(--text);
      transition: background .16s var(--ease), transform .16s var(--ease);
    }

    .calendar-choice:hover {
      background: rgba(255,255,255,.11);
      transform: translateY(-1px);
    }

    .choice-icon {
      width: 38px;
      height: 38px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background:
        linear-gradient(135deg, rgba(159,215,255,.32), rgba(217,184,255,.25)),
        rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.14);
      font-weight: 800;
    }

    .calendar-choice strong {
      display: block;
      font-size: 14px;
      letter-spacing: -.02em;
    }

    .calendar-choice em {
      display: block;
      margin-top: 3px;
      font-style: normal;
      color: var(--soft);
      font-size: 12px;
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 12px;
      align-items: center;
      margin-bottom: 14px;
      padding: 12px;
      border-radius: var(--radius-xl);
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.055)),
        rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 22px 65px rgba(0,0,0,.18);
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
    }

    .date-wrap {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .date-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      background: rgba(3,5,12,.34);
      border: 1px solid rgba(255,255,255,.12);
    }

    .date-pill span {
      color: var(--soft);
      font-size: 13px;
    }

    input[type="date"] {
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      color-scheme: dark;
      min-width: 132px;
    }

    .hint {
      color: var(--soft);
      font-size: 13px;
      text-align: center;
    }

    .right-tools {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }

    .board {
      border-radius: var(--radius-xl);
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.045)),
        rgba(255,255,255,.055);
      border: 1px solid rgba(255,255,255,.16);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.22), 0 24px 80px rgba(0,0,0,.24);
      backdrop-filter: blur(30px) saturate(160%);
      -webkit-backdrop-filter: blur(30px) saturate(160%);
      /* No native text selection / long-press magnifier on the timeline. */
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    /* While selecting on touch, lock the scrollers so the drag selects (not pans). */
    body.selecting .scroll {
      touch-action: none;
    }

    .header-row,
    .time-row {
      display: grid;
      grid-template-columns: var(--city) 1fr;
    }

    .left-head {
      min-height: 74px;
      padding: 16px 18px;
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.045);
    }

    .left-head strong {
      display: block;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .base-date {
      margin-top: 5px;
      font-size: 13.5px;
      font-weight: 640;
      color: var(--text);
      letter-spacing: -.015em;
    }
    .base-date::first-letter {
      text-transform: uppercase;
    }

    .left-head span {
      display: inline-flex;
      align-items: center;
      margin-top: 8px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      color: rgba(255,255,255,.82);
      background:
        linear-gradient(180deg, rgba(159,215,255,.18), rgba(217,184,255,.10)),
        rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.13);
    }

    .scroll {
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.28) transparent;
      /* Keep horizontal pan natural on trackpad / touch; never lock vertical page scroll */
      touch-action: pan-x pan-y;
      overscroll-behavior-x: contain;
    }

    .hours {
      position: relative;
      display: grid;
      grid-template-columns: repeat(24, var(--cell));
      width: calc(24 * var(--cell));
    }

    .hour-head {
      position: relative;
      min-height: 74px;
      padding: 18px 5px 9px;
      display: grid;
      place-items: center;
      border-right: 1px solid rgba(255,255,255,.09);
      border-bottom: 1px solid var(--line);
      text-align: center;
      background: rgba(255,255,255,.032);
    }

    .hour-head .h {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
    }

    .time-stack {
      position: relative;
      z-index: 1;
      display: grid;
      place-items: center;
      line-height: .9;
      gap: 5px;
    }

    .time-stack .num {
      font-size: 24px;
      font-weight: 820;
      letter-spacing: -.07em;
    }

    .time-stack .ampm {
      font-size: 10px;
      font-weight: 760;
      letter-spacing: .10em;
      color: rgba(255,255,255,.48);
    }

    .cell.selected .time-stack .ampm {
      color: rgba(255,255,255,.82);
    }

    /* Soft full-cell cursor band — sits behind the time number, never blocks text */
    .cursor-band {
      position: absolute;
      z-index: 1;
      inset: 3px 3px;
      border-radius: 18px;
      opacity: 0;
      transform: scaleX(.9);
      background:
        linear-gradient(180deg, rgba(159,215,255,.14), rgba(217,184,255,.09)),
        rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.30);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.26),
        inset 0 -1px 0 rgba(255,255,255,.08),
        0 0 26px rgba(159,215,255,.22);
      transition: opacity .14s var(--ease), transform .14s var(--ease), border-color .14s var(--ease);
      pointer-events: none;
      will-change: opacity, transform;
    }

    .hour-head.cursor .cursor-band,
    .cell.cursor .cursor-band {
      opacity: 1;
      transform: scaleX(1);
    }

    .hour-head.cursor,
    .cell.cursor {
      background-image: linear-gradient(180deg, rgba(159,215,255,.045), rgba(217,184,255,.035));
    }

    .cell.cursor .time-stack .ampm,
    .hour-head.cursor .time-stack .ampm {
      color: rgba(255,255,255,.86);
    }

    .hour-head .d {
      position: relative;
      z-index: 1;
      margin-top: 6px;
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
    }

    .time-row {
      min-height: var(--row);
      border-bottom: 1px solid rgba(255,255,255,.10);
    }

    .time-row:last-child {
      border-bottom: 0;
    }

    .city-card {
      position: relative;
      min-height: var(--row);
      padding: 10px 12px;
      border-right: 1px solid var(--line);
      background: rgba(255,255,255,.028);
      display: flex;
      align-items: center;
      gap: 11px;
      transition: background .18s var(--ease);
      cursor: pointer;
      user-select: none;
    }

    .city-card:hover {
      background: rgba(255,255,255,.07);
    }

    .city-card.anchor {
      background:
        linear-gradient(90deg, rgba(159,215,255,.13), rgba(217,184,255,.05)),
        rgba(255,255,255,.035);
    }

    .city-glow {
      width: 12px;
      align-self: stretch;
      min-height: 44px;
      border-radius: 999px;
      background: linear-gradient(180deg, var(--blue), var(--violet));
      box-shadow: 0 0 24px rgba(159,215,255,.24);
      flex: 0 0 auto;
      opacity: .92;
    }

    .city-main {
      min-width: 0;
      flex: 1;
    }

    .city-line {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .city-name {
      font-size: 16px;
      font-weight: 780;
      letter-spacing: -.025em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .base-tag {
      flex: 0 0 auto;
      font-size: 9px;
      font-weight: 820;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: rgba(8,12,24,.9);
      background: linear-gradient(180deg, var(--blue), var(--violet));
      padding: 2px 7px;
      border-radius: 999px;
    }

    .offset {
      color: var(--muted);
      font-size: 11px;
      flex: 0 0 auto;
      margin-left: auto;
    }

    .current-time {
      margin-top: 5px;
      color: rgba(255,255,255,.82);
      font-size: 13px;
      letter-spacing: -.01em;
    }

    /* IANA zone — kept for reference but visually quietest line. */
    .zone-name {
      margin-top: 3px;
      color: var(--muted);
      font-size: 10.5px;
      letter-spacing: .005em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: .85;
    }

    /* Actions overlay on the right and reveal on hover, so the city name keeps
       the full row width and stays prominent. */
    .city-actions {
      position: absolute;
      right: 10px;
      top: 50%;
      display: flex;
      gap: 5px;
      padding: 4px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(10,12,22,.78) 26%);
      opacity: 0;
      pointer-events: none;
      transform: translateY(-50%) translateX(6px);
      transition: opacity .18s var(--ease), transform .18s var(--ease);
    }

    .city-card:hover .city-actions,
    .city-card:focus-within .city-actions {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(-50%);
    }

    .mini-btn {
      width: 31px;
      height: 31px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.10);
      color: rgba(255,255,255,.66);
      transition: background .18s var(--ease), color .18s var(--ease), transform .18s var(--ease);
    }

    .mini-btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.14);
      color: var(--text);
    }

    .cell {
      height: var(--row);
      border-right: 1px solid rgba(255,255,255,.075);
      display: grid;
      place-items: center;
      position: relative;
      color: rgba(255,255,255,.80);
      cursor: pointer;
      user-select: none;
      transition: background .14s var(--ease), color .14s var(--ease);
    }

    .cell::before {
      content: "";
      position: absolute;
      inset: 9px 5px;
      border-radius: 17px;
      background: transparent;
      transform: scale(.93);
      transition: background .16s var(--ease), transform .16s var(--ease), box-shadow .16s var(--ease);
    }

    .cell:hover::before {
      background: rgba(255,255,255,.10);
      transform: scale(1);
    }

    /* One continuous selection band per row that glides between half-hour
       slots instead of painting cell-by-cell. --sel-start / --sel-len are set
       (in half-hour units) on the parent .hours element. */
    .sel-band {
      position: absolute;
      z-index: 0;
      top: 8px;
      bottom: 8px;
      left: calc(var(--sel-start, 18) * (var(--cell) / 2) + 4px);
      width: calc(var(--sel-len, 2) * (var(--cell) / 2) - 8px);
      border-radius: 18px;
      background:
        linear-gradient(180deg, rgba(159,215,255,.50), rgba(217,184,255,.36));
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.50),
        inset 0 -1px 0 rgba(255,255,255,.12),
        0 14px 38px rgba(159,215,255,.20);
      pointer-events: none;
      transform: translateZ(0);
      transition:
        left .42s var(--ease),
        width .42s var(--ease);
      will-change: left, width;
      animation: gt-band-breathe 4.5s ease-in-out infinite;
    }

    /* Soft top sheen for depth. */
    .sel-band::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.22), transparent 46%);
      pointer-events: none;
    }

    /* Snappier tracking while actively dragging a selection. */
    body.selecting .sel-band {
      transition-duration: .12s;
      animation: none;
    }

    .cell.selected .time-stack .num {
      color: #fff;
    }

    .cell.cursor .cursor-band {
      border-color: rgba(255,255,255,.45);
      background:
        linear-gradient(180deg, rgba(159,215,255,.16), rgba(217,184,255,.11)),
        rgba(255,255,255,.05);
    }

    .cell .t {
      position: relative;
      z-index: 1;
    }

    .cell .time-stack .num {
      font-size: 21px;
    }

    .cell .time-stack .ampm {
      font-size: 9px;
    }

    /* Real daylight map — tints come from the actual sun altitude per city.
       night (below horizon) -> twilight -> golden hour -> full day. */
    .cell.sun-night {
      color: rgba(255,255,255,.34);
      background: rgba(3,6,16,.46);
    }

    .cell.sun-twilight {
      color: rgba(255,255,255,.62);
      background: rgba(120,120,200,.13);
    }

    .cell.sun-golden {
      background: rgba(255,176,92,.16);
    }

    .cell.sun-day {
      background: rgba(150,232,185,.10);
    }

    /* "Other day" veil: cells on the previous/next calendar day get a faint
       cool/warm tint so each day reads as its own block. */
    .cell.prev-day::after,
    .cell.next-day::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .cell.prev-day::after { background: rgba(96,128,210,.12); }
    .cell.next-day::after { background: rgba(255,176,120,.12); }
    .cell.prev-day .t,
    .cell.next-day .t { opacity: .72; }

    /* Day boundary: a clear, slightly accented midnight divider. */
    .cell.day-start,
    .hour-head.day-start:not(:first-child) {
      border-left: 2px solid rgba(159,215,255,.42);
    }

    /* Scroll-following day label: pinned to the left edge of the scroller,
       flips to the new date exactly when a midnight boundary scrolls past. */
    .day-pin {
      position: absolute;
      z-index: 4;
      top: 3px;
      left: 5px;
      padding: 1px 6px;
      border-radius: 999px;
      background: rgba(6,9,18,.62);
      border: 1px solid rgba(255,255,255,.1);
      color: rgba(255,255,255,.55);
      font-size: 8px;
      font-weight: 760;
      letter-spacing: .02em;
      white-space: nowrap;
      pointer-events: none;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .day-pin.head-pin {
      top: 4px;
      font-size: 8.5px;
      color: rgba(255,255,255,.78);
      background: rgba(6,9,18,.7);
      border-color: rgba(255,255,255,.14);
    }

    .day-pin.flip {
      animation: gt-pin-flash .26s var(--ease);
    }

    @keyframes gt-pin-flash {
      0%   { opacity: .15; }
      100% { opacity: 1; }
    }

    .cell.now {
      box-shadow: inset 2px 0 0 rgba(255,255,255,.72);
    }

    .sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 80;
      background: rgba(0,0,0,.28);
      backdrop-filter: blur(4px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .22s var(--ease);
    }

    .sheet-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .sheet {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      z-index: 90;
      width: min(760px, calc(100vw - 24px));
      max-height: min(720px, calc(100vh - 34px));
      transform: translateX(-50%) translateY(24px) scale(.98);
      opacity: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      border-radius: 34px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.075)),
        rgba(8, 10, 20, .82);
      border: 1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.26),
        0 28px 90px rgba(0,0,0,.48);
      backdrop-filter: blur(34px) saturate(175%);
      -webkit-backdrop-filter: blur(34px) saturate(175%);
      overflow: hidden;
      transition: transform .24s var(--ease), opacity .24s var(--ease);
    }

    .sheet.open {
      opacity: 1;
      pointer-events: auto;
      transform: translateX(-50%) translateY(0) scale(1);
    }

    .grabber {
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: rgba(255,255,255,.25);
      margin: 10px auto 4px;
    }

    .sheet-top {
      padding: 12px 16px 14px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.12);
    }

    .sheet-title h2 {
      margin: 0;
      font-size: 22px;
      letter-spacing: -.045em;
    }

    .sheet-title p {
      margin: 5px 0 0;
      color: var(--soft);
      font-size: 13px;
    }

    .search {
      padding: 0 16px 12px;
    }

    .search input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,.14);
      outline: none;
      background: rgba(0,0,0,.22);
      color: var(--text);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
    }

    .zone-list {
      overflow: auto;
      padding: 0 10px 12px;
    }

    .zone-option {
      width: 100%;
      text-align: left;
      padding: 13px 12px;
      margin: 4px 0;
      border-radius: 22px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      background: transparent;
      transition: background .16s var(--ease);
    }

    .zone-option:hover {
      background: rgba(255,255,255,.10);
    }

    .zone-option strong {
      display: block;
      font-size: 15px;
      letter-spacing: -.02em;
    }

    .zone-option span {
      display: block;
      margin-top: 4px;
      color: var(--soft);
      font-size: 12px;
    }

    .zone-option em {
      align-self: center;
      font-style: normal;
      color: var(--muted);
      font-size: 12px;
    }

    .zone-empty {
      padding: 20px 14px;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
    }

    .toast {
      position: fixed;
      z-index: 110;
      right: 16px;
      bottom: 18px;
      max-width: min(420px, calc(100vw - 32px));
      padding: 12px 14px;
      border-radius: 18px;
      background: rgba(4,7,16,.76);
      border: 1px solid rgba(255,255,255,.16);
      color: rgba(255,255,255,.84);
      box-shadow: 0 18px 60px rgba(0,0,0,.36);
      backdrop-filter: blur(24px);
      opacity: 0;
      transform: translateY(10px);
      pointer-events: none;
      transition: opacity .2s var(--ease), transform .2s var(--ease);
      font-size: 13px;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 980px) {
      :root {
        --city: 210px;
        --cell: 58px;
      }

      .nav,
      .toolbar {
        grid-template-columns: 1fr;
      }

      .brand,
      .actions,
      .date-wrap,
      .right-tools {
        justify-content: center;
        flex-wrap: wrap;
      }

      .brand {
        text-align: center;
      }

      .island {
        width: 100%;
      }

      .hint {
        order: -1;
      }
    }

    @media (max-width: 620px) {
      :root {
        --city: 138px;
        --cell: 52px;
        --row: 66px;
      }

      .app {
        width: calc(100vw - 12px);
        padding: 8px 0 24px;
      }

      /* Compact the whole header chrome so the timeline appears much higher. */
      .nav {
        gap: 8px;
        margin-bottom: 10px;
      }

      .brand { gap: 9px; }

      .logo {
        width: 34px;
        height: 34px;
        border-radius: 13px;
      }

      h1 { font-size: 22px; }

      .brand p { display: none; }

      .island {
        min-height: 0;
        padding: 8px 15px;
        border-radius: 20px;
      }

      .island small { display: none; }

      .island strong { font-size: 19px; }

      .island .chip { display: none; }

      .actions { gap: 6px; }

      .actions .glass-btn { padding: 9px 12px; font-size: 13px; }

      #copyBtn { display: none; } /* Compartir lo cubre en móvil */

      .toolbar {
        padding: 9px;
        margin-bottom: 10px;
        border-radius: 22px;
        gap: 8px;
      }

      .hint { display: none; }

      .date-wrap {
        flex-wrap: nowrap;
        gap: 6px;
        justify-content: center;
      }

      .date-pill { padding: 7px 10px; }

      .date-pill span { display: none; }

      .date-wrap .glass-btn { padding: 8px 11px; }

      .right-tools { gap: 6px; }

      .right-tools .glass-btn { padding: 9px 12px; }

      .left-head {
        padding: 11px 10px;
      }

      .left-head strong { font-size: 14px; }

      .base-date { font-size: 12px; }

      .left-head span {
        display: inline-flex;
        font-size: 11px;
        padding: 4px 7px;
        margin-top: 6px;
      }

      .city-card {
        padding: 9px 8px;
        gap: 8px;
      }

      .city-glow {
        display: none;
      }

      .city-name {
        font-size: 14px;
      }

      /* The left panel already says "Base · …", so free the row for the name. */
      .base-tag { display: none; }

      .offset { font-size: 10px; }

      .zone-name {
        font-size: 10px;
      }

      .current-time {
        font-size: 11px;
      }

      .city-actions {
        display: none;
      }

      .time-stack .num {
        font-size: 21px;
      }

      .cell .time-stack .num {
        font-size: 19px;
      }

      .cell .time-stack .ampm {
        font-size: 8px;
      }

      .sheet {
        width: calc(100vw - 12px);
        border-radius: 30px;
      }
    }

    /* ---------- motion / polish ---------- */

    @keyframes gt-rise {
      from { opacity: 0; transform: translateY(16px) scale(.99); }
      to   { opacity: 1; transform: none; }
    }

    @keyframes gt-band-breathe {
      0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,.50), inset 0 -1px 0 rgba(255,255,255,.12), 0 14px 38px rgba(159,215,255,.18); }
      50%      { box-shadow: inset 0 1px 0 rgba(255,255,255,.50), inset 0 -1px 0 rgba(255,255,255,.12), 0 18px 50px rgba(159,215,255,.32); }
    }

    @keyframes gt-now-pulse {
      0%, 100% { opacity: .55; }
      50%      { opacity: 1; }
    }

    @keyframes gt-pop {
      0%   { transform: scale(.6); opacity: 0; }
      60%  { transform: scale(1.06); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    .nav     { animation: gt-rise .5s var(--ease) both; }
    .toolbar { animation: gt-rise .55s .06s var(--ease) both; }
    .board   { animation: gt-rise .6s .12s var(--ease) both; }

    /* Ambient mood veil — tints the whole scene by the sun phase at the selected
       time (warm at golden hour, deep at night). Crossfades smoothly. */
    .mood-veil {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-color: transparent;
      transition: background-color 1.4s var(--ease);
    }
    body[data-mood="day"]      .mood-veil { background-color: rgba(150,200,255,.05); }
    body[data-mood="golden"]   .mood-veil { background-color: rgba(255,150,60,.11); }
    body[data-mood="twilight"] .mood-veil { background-color: rgba(120,90,210,.13); }
    body[data-mood="night"]    .mood-veil { background-color: rgba(4,8,26,.42); }

    /* Ambient living aurora — slow drifting light behind the glass. */
    .aurora {
      position: fixed;
      inset: -15%;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      filter: blur(70px) saturate(140%);
    }
    .aurora span {
      position: absolute;
      display: block;
      border-radius: 50%;
      opacity: .42;
      mix-blend-mode: screen;
      will-change: transform;
    }
    .aurora span:nth-child(1) {
      width: 48vw; height: 48vw; left: 0%; top: -8%;
      background: radial-gradient(circle, rgba(115,198,255,.85), transparent 68%);
      animation: gt-drift1 28s ease-in-out infinite;
    }
    .aurora span:nth-child(2) {
      width: 44vw; height: 44vw; right: -4%; top: -4%;
      background: radial-gradient(circle, rgba(217,184,255,.8), transparent 68%);
      animation: gt-drift2 34s ease-in-out infinite;
    }
    .aurora span:nth-child(3) {
      width: 54vw; height: 54vw; left: 28%; bottom: -22%;
      background: radial-gradient(circle, rgba(255,181,223,.6), transparent 70%);
      animation: gt-drift3 40s ease-in-out infinite;
    }
    @keyframes gt-drift1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(7vw, 5vh) scale(1.14); }
    }
    @keyframes gt-drift2 {
      0%, 100% { transform: translate(0, 0) scale(1.05); }
      50%      { transform: translate(-6vw, 6vh) scale(.92); }
    }
    @keyframes gt-drift3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50%      { transform: translate(-5vw, -6vh) scale(1.16); }
    }

    /* Liquid light sweep across the selection band. */
    .sel-band::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      background: linear-gradient(115deg, transparent 38%, rgba(255,255,255,.45) 50%, transparent 62%);
      background-size: 240% 100%;
      mix-blend-mode: screen;
      opacity: .7;
      animation: gt-shimmer 3.8s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes gt-shimmer {
      0%   { background-position: 130% 0; }
      100% { background-position: -30% 0; }
    }
    body.selecting .sel-band::before { animation: none; }

    /* Gently floating logo. */
    .logo {
      animation: gt-float 6s ease-in-out infinite;
      will-change: transform;
    }
    @keyframes gt-float {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50%      { transform: translateY(-3px) rotate(1.2deg); }
    }

    /* Staggered row entrance — only during the initial mount window. */
    .board.intro .time-row { animation: gt-rise .55s var(--ease) both; }
    .board.intro .time-row:nth-child(1) { animation-delay: .14s; }
    .board.intro .time-row:nth-child(2) { animation-delay: .20s; }
    .board.intro .time-row:nth-child(3) { animation-delay: .26s; }
    .board.intro .time-row:nth-child(4) { animation-delay: .32s; }
    .board.intro .time-row:nth-child(5) { animation-delay: .38s; }
    .board.intro .time-row:nth-child(6) { animation-delay: .44s; }
    .board.intro .time-row:nth-child(n+7) { animation-delay: .5s; }

    /* Gentle living "now" marker. */
    .cell.now {
      box-shadow: none;
    }
    .cell.now::before {
      box-shadow: inset 2px 0 0 rgba(255,255,255,.8);
      animation: gt-now-pulse 2.6s ease-in-out infinite;
    }

    /* Tactile press feedback. */
    .glass-btn:active { transform: translateY(0) scale(.96); }
    .mini-btn:active  { transform: scale(.9); }
    .calendar-choice:active,
    .zone-option:active { transform: scale(.985); }
    .cell:active::before {
      background: rgba(255,255,255,.16);
      transform: scale(.95);
    }
    .city-card:active { transform: scale(.992); }

    /* Sheet / popover content easing in. */
    .sheet.open .zone-list,
    .calendar-menu.open .calendar-popover > * {
      animation: gt-rise .32s var(--ease) both;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        transition-duration: .001s !important;
        animation-duration: .001s !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }
  </style>
</head>
<body>
  <div class="aurora" aria-hidden="true"><span></span><span></span><span></span></div>
  <div class="mood-veil" aria-hidden="true"></div>
  <main class="app">
    <header class="nav">
      <section class="brand">
        <div class="logo" aria-hidden="true"></div>
        <div>
          <h1>Glass Time</h1>
          <p>Conversor visual de fecha y hora por zonas horarias.</p>
        </div>
      </section>

      <section class="island" aria-live="polite">
        <div>
          <small>Hora seleccionada</small>
          <strong id="selectedSummary">—</strong>
        </div>
        <div class="chip" id="selectedDateChip">—</div>
      </section>

      <section class="actions">
        <button class="glass-btn" id="nowBtn">Ahora</button>
        <button class="glass-btn" id="copyBtn">Copiar</button>
        <button class="glass-btn" id="shareBtn">Compartir</button>
        <div class="calendar-menu" id="calendarMenu">
          <button class="glass-btn calendar-plus" id="calendarMenuBtn" aria-expanded="false">＋ Guardar</button>
          <div class="calendar-popover" id="calendarPopover" role="menu">
            <div class="calendar-title-field">
              <label for="eventTitleInput">Título</label>
              <input id="eventTitleInput" type="text" placeholder="Ej. Weekly sync, llamada, recordatorio..." />
            </div>
            <button class="calendar-choice" id="googleBtn" role="menuitem">
              <span class="choice-icon">G</span>
              <span>
                <strong>Google Calendar</strong>
                <em>Abre el evento listo para guardar</em>
              </span>
            </button>
            <button class="calendar-choice" id="icsBtn" role="menuitem">
              <span class="choice-icon">⌁</span>
              <span>
                <strong>Calendario nativo</strong>
                <em>Apple Calendar / Outlook / .ics</em>
              </span>
            </button>
          </div>
        </div>
      </section>
    </header>

    <section class="toolbar">
      <div class="date-wrap">
        <button class="glass-btn" id="prevBtn">← Día</button>
        <div class="date-pill">
          <span>Fecha base</span>
          <input id="dateInput" type="date" />
        </div>
        <button class="glass-btn" id="nextBtn">Día →</button>
      </div>

      <div class="hint">Arrastra para crear un rango · toca una ciudad para cambiarla.</div>

      <div class="right-tools">
        <button class="glass-btn" id="addBtn">+ Ciudad</button>
        <button class="glass-btn" id="resetBtn">Reset</button>
      </div>
    </section>

    <section class="board" aria-label="Conversor visual">
      <div class="header-row">
        <div class="left-head">
          <strong id="baseLabel">Base</strong>
          <div id="baseDate" class="base-date">—</div>
          <span id="durationLabel">Seleccionado · 1h</span>
        </div>
        <div class="scroll" id="headScroll">
          <div class="hours" id="hourHeader"></div>
        </div>
      </div>

      <div id="rows"></div>
    </section>
  </main>

  <div class="sheet-backdrop" id="backdrop"></div>

  <section class="sheet" id="sheet" aria-modal="true" role="dialog">
    <div class="grabber"></div>
    <div class="sheet-top">
      <div class="sheet-title">
        <h2 id="sheetTitle">Cambiar timezone</h2>
        <p id="sheetSubtitle">Busca una ciudad o zona horaria.</p>
      </div>
      <button class="glass-btn" id="closeSheetBtn">Cerrar</button>
    </div>
    <div class="search">
      <input id="zoneSearch" type="search" placeholder="Buscar: Madrid, Sydney, UTC, Bali..." />
    </div>
    <div class="zone-list" id="zoneList"></div>
  </section>

  <div class="toast" id="toast"></div>

  <script>
    "use strict";

    /* ===== data/timezone-library.js ===== */

    /* Glass Time — data/timezone-library
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */

    /* [label, IANA timeZone, latitude, longitude] — coords drive the real sun engine. */
    const ZONE_LIBRARY = [
      ["Madrid", "Europe/Madrid", 40.42, -3.70],
      ["Barcelona", "Europe/Madrid", 41.39, 2.17],
      ["Las Palmas", "Atlantic/Canary", 28.12, -15.44],
      ["London", "Europe/London", 51.51, -0.13],
      ["Lisbon", "Europe/Lisbon", 38.72, -9.14],
      ["Paris", "Europe/Paris", 48.85, 2.35],
      ["Berlin", "Europe/Berlin", 52.52, 13.40],
      ["Amsterdam", "Europe/Amsterdam", 52.37, 4.90],
      ["Rome", "Europe/Rome", 41.90, 12.50],
      ["Dublin", "Europe/Dublin", 53.35, -6.26],
      ["Sydney", "Australia/Sydney", -33.87, 151.21],
      ["Melbourne", "Australia/Melbourne", -37.81, 144.96],
      ["Brisbane", "Australia/Brisbane", -27.47, 153.03],
      ["Perth", "Australia/Perth", -31.95, 115.86],
      ["Auckland", "Pacific/Auckland", -36.85, 174.76],
      ["Bali", "Asia/Makassar", -8.65, 115.22],
      ["Singapore", "Asia/Singapore", 1.35, 103.82],
      ["Bangkok", "Asia/Bangkok", 13.76, 100.50],
      ["Tokyo", "Asia/Tokyo", 35.68, 139.69],
      ["Seoul", "Asia/Seoul", 37.57, 126.98],
      ["Dubai", "Asia/Dubai", 25.20, 55.27],
      ["Mumbai", "Asia/Kolkata", 19.08, 72.88],
      ["Hong Kong", "Asia/Hong_Kong", 22.32, 114.17],
      ["Shanghai", "Asia/Shanghai", 31.23, 121.47],
      ["New York", "America/New_York", 40.71, -74.01],
      ["Los Angeles", "America/Los_Angeles", 34.05, -118.24],
      ["San Francisco", "America/Los_Angeles", 37.77, -122.42],
      ["Chicago", "America/Chicago", 41.88, -87.63],
      ["Denver", "America/Denver", 39.74, -104.99],
      ["Mexico City", "America/Mexico_City", 19.43, -99.13],
      ["Costa Rica", "America/Costa_Rica", 9.93, -84.08],
      ["Nicaragua", "America/Managua", 12.11, -86.24],
      ["Lima", "America/Lima", -12.05, -77.04],
      ["Bogotá", "America/Bogota", 4.71, -74.07],
      ["Buenos Aires", "America/Argentina/Buenos_Aires", -34.60, -58.38],
      ["São Paulo", "America/Sao_Paulo", -23.55, -46.63],
      ["Toronto", "America/Toronto", 43.65, -79.38],
      ["Vancouver", "America/Vancouver", 49.28, -123.12],
      ["UTC", "UTC", 0, 0]
    ];

    const COLORS = ["#9fd7ff", "#d9b8ff", "#bdf7d2", "#ffd2b7", "#ffb5df", "#c6d4ff"];

    /* Coordinate lookups for the sun engine. */
    const COORDS_BY_LABEL = {};
    const COORDS_BY_TZ = {};
    ZONE_LIBRARY.forEach(([label, tz, lat, lon]) => {
      COORDS_BY_LABEL[label] = [lat, lon];
      if (!(tz in COORDS_BY_TZ)) COORDS_BY_TZ[tz] = [lat, lon];
    });

    /* ===== core/date-utils.js ===== */

    /* Glass Time — core/date-utils
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- date-utils ---------- */

    function id() {
      return crypto?.randomUUID?.() || "id-" + Math.random().toString(36).slice(2);
    }

    function pad(n) {
      return String(n).padStart(2, "0");
    }

    function escapeHTML(str) {
      return String(str).replace(/[&<>"']/g, c => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#39;"
      }[c]));
    }

    function dateFromISO(iso) {
      const [y, m, d] = iso.split("-").map(Number);
      return new Date(Date.UTC(y, m - 1, d));
    }

    function addDays(iso, amount) {
      const d = dateFromISO(iso);
      d.setUTCDate(d.getUTCDate() + amount);
      return `${d.getUTCFullYear()}-${pad(d.getUTCMonth() + 1)}-${pad(d.getUTCDate())}`;
    }

    function normalizedHour(hour) {
      return ((hour % 24) + 24) % 24;
    }

    function hour12(hour) {
      const h = normalizedHour(hour);
      return h % 12 || 12;
    }

    function meridiem(hour) {
      return normalizedHour(hour) >= 12 ? "PM" : "AM";
    }

    function compactHourHTML(hour) {
      return `<span class="time-stack"><span class="num">${hour12(hour)}</span><span class="ampm">${meridiem(hour)}</span></span>`;
    }

    function fmtDisplayTime(hour, minute = 0) {
      const suffix = meridiem(hour);
      if (minute === 0) return `${hour12(hour)}${suffix}`;
      return `${hour12(hour)}:${pad(minute)}${suffix}`;
    }

    /* Slots are half-hours: 0..48 (48 = end-of-day 24:00). */
    function slotHour(slot) {

    function slotMinute(slot) {
      return slot % 2 ? 30 : 0;
    }

    function fmtSlot(slot) {

    function clampSlot(slot) {

      const h = Math.floor(mins / 60);
      const m = mins % 60;
      if (h && m) return `${h}h ${m}m`;
      if (h) return `${h}h`;
      return `${m}m`;

    /* ===== core/timezone-engine.js ===== */

    /* Glass Time — core/timezone-engine
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timezone-engine ---------- */

    function getParts(date, timeZone) {
      const formatter = new Intl.DateTimeFormat("en-GB", {
        timeZone,
        weekday: "short",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hourCycle: "h23"
      });

      const out = {};
      formatter.formatToParts(date).forEach(part => {
        if (part.type !== "literal") out[part.type] = part.value;
      });

      return {
        weekday: out.weekday,
        year: Number(out.year),
        month: Number(out.month),
        day: Number(out.day),
        hour: Number(out.hour),
        minute: Number(out.minute)
      };
    }

    function todayInZone(timeZone) {
      const p = getParts(new Date(), timeZone);
      return `${p.year}-${pad(p.month)}-${pad(p.day)}`;
    }

    /* DST-safe wall-time -> UTC instant via fixed-point iteration anchored to
       the target wall time. (The previous formula re-subtracted the offset on
       every pass and diverged — e.g. 9AM 25/06 Sydney resolved to 3AM 24/06.) */
    function zonedTimeToUtc(dateISO, hour, minute, timeZone) {
      const [year, month, day] = dateISO.split("-").map(Number);
      const target = Date.UTC(year, month - 1, day, hour, minute, 0);
      let guess = target;

      for (let i = 0; i < 4; i++) {
        const p = getParts(new Date(guess), timeZone);
        const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute, 0);
        const diff = localAsUTC - target;
        if (diff === 0) break;
        guess -= diff;
      }

      return new Date(guess);
    }

    function offsetText(date, timeZone) {
      const p = getParts(date, timeZone);
      const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute);
      // getParts is minute-precision, so compare against the minute-floored instant
      // (otherwise the seconds make e.g. GMT+10 read as "GMT+9:59").
      const floored = Math.floor(date.getTime() / 60000) * 60000;
      const mins = Math.round((localAsUTC - floored) / 60000);
      const sign = mins >= 0 ? "+" : "-";
      const abs = Math.abs(mins);
      const h = Math.floor(abs / 60);
      const m = abs % 60;
      return `GMT${sign}${h}${m ? ":" + pad(m) : ""}`;
    }

    /* ===== core/sun-engine.js ===== */

    /* Glass Time — core/sun-engine
       Real solar position (no API): given an instant + lat/lon, returns the sun's
       altitude in degrees, which we classify into day / golden / twilight / night.
       Algorithm adapted from the standard SunCalc approach. */

    const RAD = Math.PI / 180;
    const OBLIQUITY = RAD * 23.4397;

    function toDays(date) {
      return date.valueOf() / 86400000 - 0.5 + 2440588 - 2451545; // days since J2000
    }

    function solarMeanAnomaly(d) {
      return RAD * (357.5291 + 0.98560028 * d);
    }

    function eclipticLongitude(M) {
      const C = RAD * (1.9148 * Math.sin(M) + 0.02 * Math.sin(2 * M) + 0.0003 * Math.sin(3 * M));
      const P = RAD * 102.9372; // perihelion of Earth
      return M + C + P + Math.PI;
    }

    /* Sun altitude (degrees above the horizon) at a UTC instant for lat/lon. */
    function sunAltitude(date, lat, lon) {
      const d = toDays(date);
      const M = solarMeanAnomaly(d);
      const L = eclipticLongitude(M);
      const dec = Math.asin(Math.sin(L) * Math.sin(OBLIQUITY));
      const ra = Math.atan2(Math.sin(L) * Math.cos(OBLIQUITY), Math.cos(L));
      const lw = RAD * -lon;
      const phi = RAD * lat;
      const th = RAD * (280.16 + 360.9856235 * d) - lw; // sidereal time
      const H = th - ra; // hour angle
      const alt = Math.asin(Math.sin(phi) * Math.sin(dec) + Math.cos(phi) * Math.cos(dec) * Math.cos(H));
      return alt / RAD;
    }

    /* Phase name from altitude — used for cell tints and ambient mood. */
    function sunPhase(altitudeDeg) {
      if (altitudeDeg >= 6) return "day";
      if (altitudeDeg >= -0.833) return "golden";   // sun near/just below horizon
      if (altitudeDeg >= -12) return "twilight";     // civil + nautical
      return "night";
    }

    /* Resolve coordinates for a zone: prefer its city, then its timezone, then a
       rough longitude from the current UTC offset (lat 0). Never throws. */
    function coordsFor(zone, atDate) {
      if (typeof zone.lat === "number" && typeof zone.lon === "number") return [zone.lat, zone.lon];
      if (zone.label && COORDS_BY_LABEL[zone.label]) return COORDS_BY_LABEL[zone.label];
      if (zone.timeZone && COORDS_BY_TZ[zone.timeZone]) return COORDS_BY_TZ[zone.timeZone];
      const mins = offsetMinutes(atDate || new Date(), zone.timeZone);
      return [0, Math.max(-180, Math.min(180, mins / 4))];
    }

    /* UTC offset in minutes for a timezone at a given instant. */
    function offsetMinutes(date, timeZone) {
      const p = getParts(date, timeZone);
      const localAsUTC = Date.UTC(p.year, p.month - 1, p.day, p.hour, p.minute);
      const floored = Math.floor(date.getTime() / 60000) * 60000;
      return Math.round((localAsUTC - floored) / 60000);
    }

    /* Convenience: the sun phase for a zone at a UTC instant. */
    function zonePhaseAt(zone, instant) {
      const [lat, lon] = coordsFor(zone, instant);
      return sunPhase(sunAltitude(instant, lat, lon));
    }

    /* ---------- store / selection model ---------- */

    function normalizedRange() {
      const start = Math.min(state.selectedStartSlot, state.selectedEndSlot);
      const end = Math.max(state.selectedStartSlot, state.selectedEndSlot);
      return {
        start,
        end: Math.max(start + 1, end),
        durationSlots: Math.max(1, end - start)
      };
    }

    function baseZone() {
      return state.zones[0];
    }

    function selectedInstant() {
      const { start } = normalizedRange();
      return zonedTimeToUtc(state.dateISO, slotHour(start), slotMinute(start), baseZone().timeZone);
    }

    function selectedEndInstant() {
      const { end } = normalizedRange();
      return zonedTimeToUtc(state.dateISO, slotHour(end), slotMinute(end), baseZone().timeZone);
    }

    function moveZoneToBase(zoneId, preserveCurrentInstant = true) {
      const index = state.zones.findIndex(z => z.id === zoneId);
      if (index <= 0) return;
      const instant = preserveCurrentInstant ? selectedInstant() : null;
      const duration = normalizedRange().durationSlots;
      const [zone] = state.zones.splice(index, 1);
      state.zones.unshift(zone);
      if (instant) {
        const p = getParts(instant, zone.timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
      }
    }

    /* ===== state/persistence.js ===== */

    /* Glass Time — state/persistence
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- persistence ---------- */

    function save() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({
          zones: state.zones,
          dateISO: state.dateISO,
          selectedStartSlot: state.selectedStartSlot,
          selectedEndSlot: state.selectedEndSlot
        }));
      } catch { /* storage may be unavailable (private mode); ignore */ }
    }

    function load() {
      const fallback = [
        { id: id(), label: "Sydney", timeZone: "Australia/Sydney" },
        { id: id(), label: "Madrid", timeZone: "Europe/Madrid" },
        { id: id(), label: "New York", timeZone: "America/New_York" },
        { id: id(), label: "Bali", timeZone: "Asia/Makassar" }
      ];

      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        const parsed = raw ? JSON.parse(raw) : null;
        state.zones = parsed?.zones?.length ? parsed.zones : fallback;
        state.dateISO = parsed?.dateISO || todayInZone(state.zones[0].timeZone);
        if (Number.isInteger(parsed?.selectedStartSlot) && Number.isInteger(parsed?.selectedEndSlot)) {
          state.selectedStartSlot = clampSlot(parsed.selectedStartSlot);
          state.selectedEndSlot = clampSlot(parsed.selectedEndSlot);
        } else {
          const legacyHour = Number.isInteger(parsed?.selectedHour) ? parsed.selectedHour : 9;
          state.selectedStartSlot = legacyHour * 2;
          state.selectedEndSlot = legacyHour * 2 + 2;
        }
        state.cursorSlot = state.selectedStartSlot;
      } catch {
        state.zones = fallback;
        state.dateISO = todayInZone(state.zones[0].timeZone);
        state.selectedStartSlot = 18;
        state.selectedEndSlot = 20;
        state.cursorSlot = 18;
      }
    }

    /* Glass Time — core/calendar-export

    /* ---------- calendar export ---------- */

    function selectionLines() {
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      return state.zones.map(zone => {
        const start = getParts(startInstant, zone.timeZone);
        const end = getParts(endInstant, zone.timeZone);
        return `${zone.label}: ${fmtDate(start)} ${fmtDisplayTime(start.hour, start.minute)}–${fmtDisplayTime(end.hour, end.minute)} (${zone.timeZone})`;
      });
    }

    function googleDate(date) {
      return date.toISOString().replace(/[-:]/g, "").replace(/\.\d{3}/, "");
    }

    function calendarTitle() {
      const title = els.eventTitleInput.value.trim();
      if (title) return title;
      const { start, end } = normalizedRange();
      return `Recordatorio · ${baseZone().label} ${fmtSlot(start)}–${fmtSlot(end)}`;
    }

    function calendarDetails() {
      return [
        "Creado desde Glass Time.",
        "",
        "Conversión:",
        ...selectionLines()
      ].join("\n");
    }

    function openGoogleCalendar() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const url = new URL("https://calendar.google.com/calendar/render");
      url.searchParams.set("action", "TEMPLATE");
      url.searchParams.set("text", calendarTitle());
      url.searchParams.set("dates", `${googleDate(start)}/${googleDate(end)}`);
      url.searchParams.set("details", calendarDetails());
      url.searchParams.set("ctz", baseZone().timeZone);
      window.open(url.toString(), "_blank", "noopener,noreferrer");
      showToast("Abriendo Google Calendar.");
    }

    function escapeICS(text) {
      return String(text)
        .replace(/\\/g, "\\\\")
        .replace(/;/g, "\\;")
        .replace(/,/g, "\\,")
        .replace(/\n/g, "\\n");
    }

    function downloadICS() {
      const start = selectedInstant();
      const end = selectedEndInstant();
      const stamp = new Date();
      const uid = `${Date.now()}-${Math.random().toString(36).slice(2)}@glass-time`;
      const ics = [
        "BEGIN:VCALENDAR",
        "VERSION:2.0",
        "PRODID:-//Glass Time//Visual Timezone Converter//ES",
        "CALSCALE:GREGORIAN",
        "METHOD:PUBLISH",
        "BEGIN:VEVENT",
        `UID:${uid}`,
        `DTSTAMP:${googleDate(stamp)}`,
        `DTSTART:${googleDate(start)}`,
        `DTEND:${googleDate(end)}`,
        `SUMMARY:${escapeICS(calendarTitle())}`,
        `DESCRIPTION:${escapeICS(calendarDetails())}`,
        "BEGIN:VALARM",
        "ACTION:DISPLAY",
        "DESCRIPTION:Recordatorio",
        "TRIGGER:-PT15M",
        "END:VALARM",
        "END:VEVENT",
        "END:VCALENDAR"
      ].join("\r\n");

      const blob = new Blob([ics], { type: "text/calendar;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = `glass-time-${state.dateISO}-${pad(slotHour(normalizedRange().start))}${pad(slotMinute(normalizedRange().start))}.ics`;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
      showToast("Archivo .ics creado para Calendario/Outlook/Apple.");
    }

      const baseNow = getParts(now, base.timeZone);
      const isToday = `${baseNow.year}-${pad(baseNow.month)}-${pad(baseNow.day)}` === state.dateISO;

      state.zones.forEach(zone => {

    function updateDayPins() {
      const cw = cellWidthPx();
      const scrollers = [els.headScroll, ...document.querySelectorAll(".body-scroll")];
      scrollers.forEach(sc => {
        const hoursEl = sc.querySelector(".hours");
        const pin = hoursEl && hoursEl.querySelector(":scope > .day-pin");
        if (!pin) return;
        const left = sc.scrollLeft;
        const h = Math.max(0, Math.min(23, Math.floor(left / cw + 0.001)));
        const ref = hoursEl.querySelector(`[data-hour="${h}"]`);
        const label = ref ? ref.getAttribute("data-date") || "" : "";
        if (pin.textContent !== label) {
          pin.textContent = label;
          pin.classList.remove("flip");
          void pin.offsetWidth; // restart the flash animation
          pin.classList.add("flip");

        pin.style.transform = `translateX(${left}px)`;

      els.selectedDateChip.textContent = `${base.label} · ${fmtDate(baseStart)} · ${baseRange}`;
      els.durationLabel.textContent = `Seleccionado · ${duration}`;
      updateMood(startInstant);
    }

    /* Ambient mood: tint the whole scene by the sun phase at the base city for the
       selected time — warm at golden hour, deep at night. Updates live while dragging. */
    function updateMood(instant) {
      document.body.dataset.mood = zonePhaseAt(baseZone(), instant || selectedInstant());
    }

    /* Patch selection styling on the existing DOM — no rebuild, no scroll loss.
       The floating .sel-band glides via a CSS transition when these vars change. */
    function applySelectionDOM() {
      const range = normalizedRange();
      document.querySelectorAll(".body-scroll .hours").forEach(hours => {
        hours.style.setProperty("--sel-start", range.start);
        hours.style.setProperty("--sel-len", range.durationSlots);
      });
      for (let h = 0; h < 24; h++) {
        const selected = cellSelected(h, range);
        document.querySelectorAll(`.body-scroll .cell[data-hour="${h}"]`).forEach(cell => {
          cell.classList.toggle("selected", selected);
        });
      }
    }

    function bindScrollSync() {
      const scrollers = [els.headScroll, ...document.querySelectorAll(".body-scroll")];
      let syncing = false;

      scrollers.forEach(scroller => {
        scroller.onscroll = () => {
          if (syncing) return;
          syncing = true;
          const left = scroller.scrollLeft;
          scrollers.forEach(other => {
            if (other !== scroller) other.scrollLeft = left;
          });
          updateDayPins();
          requestAnimationFrame(() => { syncing = false; });
        };
      });
    }

    function focusHour() {
      const target = Math.max(0, slotHour(normalizedRange().start) * cellWidthPx() - 180);
      els.headScroll.scrollTo({ left: target, behavior: "smooth" });
    }

    /* ===== ui/range-selection.js ===== */

    /* Glass Time — ui/range-selection
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- range selection (pointer interactions) ---------- */

    const DRAG_THRESHOLD = 5;   // mouse/pen: px before a drag becomes a selection
    const TOUCH_HOLD_MS = 280;  // touch: hold this long (still) to enter selection mode
    const TOUCH_MOVE_TOL = 10;  // touch: movement beyond this before the hold = a scroll

    const drag = {
      active: false,
      selecting: false,
      anchor: 0,
      startX: 0,
      startY: 0,
      pointerType: "",
      pointerId: null,
      hoursEl: null,
      isHeader: false,
      captureTarget: null,
      holdTimer: null
    };

    /* Map an absolute clientX to a half-hour slot using a row's .hours rect,
       so it stays correct regardless of horizontal scroll position. */
    function slotFromClientX(clientX, hoursEl) {
      const rect = hoursEl.getBoundingClientRect();
      const cw = rect.width / 24;
      const rel = clientX - rect.left;
      let hour = Math.floor(rel / cw);
      hour = Math.max(0, Math.min(23, hour));
      const within = (rel - hour * cw) / cw;
      return clampSlot(hour * 2 + (within >= 0.5 ? 1 : 0));
    }

    /* Apply a range to state + DOM without a full render. */
    function liveRange(anchorSlot, currentSlot) {
      const a = clampSlot(anchorSlot);
      const b = clampSlot(currentSlot);
      const start = Math.min(a, b);
      const end = Math.min(48, Math.max(a, b) + 1);
      state.selectedStartSlot = start;
      state.selectedEndSlot = end;
      applySelectionDOM();
      updateCursorDOM(b);
      renderIsland();
    }

    function clearHold() {
      if (drag.holdTimer) {
        clearTimeout(drag.holdTimer);
        drag.holdTimer = null;
      }
    }

    function startSelecting() {
      drag.selecting = true;
      document.body.classList.add("selecting"); // band tracks snappily + locks scroll
      try { drag.captureTarget?.setPointerCapture?.(drag.pointerId); } catch { /* ignore */ }
    }

    function beginPointer(event, hoursEl, isHeader, captureTarget) {
      if (event.pointerType === "mouse" && event.button !== 0) return;
      let slot;
      if (isHeader) {
        const head = event.target.closest(".hour-head");
        if (!head) return;
        slot = Number(head.dataset.hour) * 2;
      } else {
        slot = slotFromClientX(event.clientX, hoursEl);
      }
      drag.active = true;
      drag.selecting = false;
      drag.anchor = slot;
      drag.startX = event.clientX;
      drag.startY = event.clientY;
      drag.pointerType = event.pointerType;
      drag.pointerId = event.pointerId;
      drag.hoursEl = hoursEl;
      drag.isHeader = isHeader;
      drag.captureTarget = captureTarget;
      clearHold();

      if (event.pointerType === "touch") {
        // Hold still to enter selection mode; a quick swipe scrolls instead.
        drag.holdTimer = setTimeout(() => {
          if (drag.active && !drag.selecting) {
            startSelecting();
            navigator.vibrate?.(15); // subtle haptic where supported
            liveRange(drag.anchor, drag.anchor); // seed a 30m selection immediately
          }
        }, TOUCH_HOLD_MS);
      }
    }

    function movePointer(event) {
      if (!drag.active) return;
      const dx = event.clientX - drag.startX;
      const dy = event.clientY - drag.startY;

      if (!drag.selecting) {
        if (drag.pointerType === "touch") {
          // Moved before the hold fired => it's a scroll; bail out of selection.
          if (Math.hypot(dx, dy) > TOUCH_MOVE_TOL) {
            clearHold();
            drag.active = false;
          }
          return;
        }
        // Mouse / pen: only start selecting after crossing the threshold.
        if (Math.abs(dx) <= DRAG_THRESHOLD && Math.abs(dy) <= DRAG_THRESHOLD) return;
        startSelecting();
      }

      event.preventDefault();
      const cur = slotFromClientX(event.clientX, drag.hoursEl);
      liveRange(drag.anchor, cur);
    }

    function endPointer(event) {
      if (!drag.active) return;
      clearHold();
      const wasSelecting = drag.selecting;
      try { drag.captureTarget?.releasePointerCapture?.(drag.pointerId); } catch { /* ignore */ }
      drag.active = false;
      drag.selecting = false;
      document.body.classList.remove("selecting"); // re-enable the eased settle glide

      if (!wasSelecting) {
        // Tap: header => 1h, cell => 30m minimum.
        if (drag.isHeader) liveRange(drag.anchor, drag.anchor + 1);
        else liveRange(drag.anchor, drag.anchor);
      }
      save();
    }

    /* ===== ui/timezone-picker.js ===== */

    /* Glass Time — ui/timezone-picker
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- timezone picker (bottom sheet) ---------- */

    function openPicker(mode, zoneId = null) {
      state.pickerMode = mode;
      state.editingZoneId = zoneId;
      const zone = state.zones.find(z => z.id === zoneId);

      els.sheetTitle.textContent = mode === "add" ? "Añadir ciudad" : `Cambiar ${zone?.label || "ciudad"}`;
      els.sheetSubtitle.textContent = mode === "add"
        ? "Elige una zona horaria para añadirla a la timeline."
        : "Toca una opción para reemplazar esta ciudad.";

      els.zoneSearch.value = "";
      renderZoneOptions("");
      els.backdrop.classList.add("open");
      els.sheet.classList.add("open");
      setTimeout(() => els.zoneSearch.focus(), 80);
    }

    function closePicker() {
      els.backdrop.classList.remove("open");
      els.sheet.classList.remove("open");
      state.editingZoneId = null;
    }

    function renderZoneOptions(query) {
      const q = query.trim().toLowerCase();
      const now = new Date();

      const matches = ZONE_LIBRARY.filter(([label, timeZone]) => {
        const text = `${label} ${timeZone}`.toLowerCase();
        return !q || text.includes(q);
      });

      if (!matches.length) {
        els.zoneList.innerHTML = `<div class="zone-empty">Sin resultados para “${escapeHTML(query)}”.</div>`;
        return;
      }

      els.zoneList.innerHTML = matches.map(([label, timeZone]) => {
        const p = getParts(now, timeZone);
        return `
          <button class="zone-option" data-label="${escapeHTML(label)}" data-timezone="${escapeHTML(timeZone)}">
            <span>
              <strong>${escapeHTML(label)}</strong>
              <span>${escapeHTML(timeZone)} · Ahora ${fmtDisplayTime(p.hour, p.minute)}</span>
            </span>
            <em>${offsetText(now, timeZone)}</em>
          </button>
        `;
      }).join("");
    }

    function chooseZone(label, timeZone) {
      if (state.pickerMode === "add") {
        const instant = selectedInstant();
        const duration = normalizedRange().durationSlots;
        const newZone = { id: id(), label, timeZone };
        state.zones.unshift(newZone);
        // New city becomes base — preserve the real-world instant + duration.
        const p = getParts(instant, timeZone);
        const startSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
        state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
        state.selectedStartSlot = startSlot;
        state.selectedEndSlot = clampSlot(startSlot + duration);
        state.cursorSlot = startSlot;
        showToast(`${label} añadido como base.`);
      } else {
        const zone = state.zones.find(z => z.id === state.editingZoneId);
        if (zone) {
          const editedId = zone.id;
          zone.label = label;
          zone.timeZone = timeZone;
          moveZoneToBase(editedId, true);
          showToast(`${label} seleccionado como base.`);
        }
      }

      closePicker();
      render();
    }

    /* Glass Time — ui/calendar-menu

    /* ===== ui/share.js ===== */

    /* Glass Time — ui/share
       Shareable state: a URL that encodes the current selection, and a glass image
       card (canvas -> PNG) shared via the Web Share API or downloaded. */

    function buildShareURL() {
      const { start, end } = normalizedRange();
      const params = new URLSearchParams();
      params.set("d", state.dateISO);
      params.set("s", start);
      params.set("e", end);
      params.set("z", state.zones.map(z => `${z.label}~${z.timeZone}`).join(";"));
      return `${location.origin}${location.pathname}?${params.toString()}`;
    }

    /* Apply state encoded in the URL (if any). Returns true when applied. */
    function applyStateFromURL() {
      const p = new URLSearchParams(location.search);
      if (!p.has("z") && !p.has("d")) return false;
      try {
        const z = p.get("z");
        if (z) {
          const zones = z.split(";").map(item => {
            const sep = item.indexOf("~");
            const label = item.slice(0, sep);
            const timeZone = item.slice(sep + 1);
            return { id: id(), label, timeZone };
          }).filter(zone => zone.timeZone);
          if (zones.length) state.zones = zones;
        }
        if (p.get("d")) state.dateISO = p.get("d");
        const s = parseInt(p.get("s"), 10);
        const e = parseInt(p.get("e"), 10);
        if (Number.isInteger(s)) state.selectedStartSlot = clampSlot(s);
        if (Number.isInteger(e)) state.selectedEndSlot = clampSlot(e);
        state.cursorSlot = state.selectedStartSlot;
        return true;
      } catch {
        return false;
      }
    }

    function roundRectPath(ctx, px, py, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(px + r, py);
      ctx.arcTo(px + w, py, px + w, py + h, r);
      ctx.arcTo(px + w, py + h, px, py + h, r);
      ctx.arcTo(px, py + h, px, py, r);
      ctx.arcTo(px, py, px + w, py, r);
      ctx.closePath();
    }

    /* Render a premium glass card summarising the selection across all cities. */
    function buildShareCanvas() {
      const W = 1080, H = 1350;
      const c = document.createElement("canvas");
      c.width = W; c.height = H;
      const x = c.getContext("2d");

      // Background
      const bg = x.createLinearGradient(0, 0, W, H);
      bg.addColorStop(0, "#080a16");
      bg.addColorStop(0.6, "#10152a");
      bg.addColorStop(1, "#181d38");
      x.fillStyle = bg; x.fillRect(0, 0, W, H);
      const glow1 = x.createRadialGradient(W * 0.16, H * 0.08, 0, W * 0.16, H * 0.08, W * 0.7);
      glow1.addColorStop(0, "rgba(115,198,255,.34)"); glow1.addColorStop(1, "rgba(115,198,255,0)");
      x.fillStyle = glow1; x.fillRect(0, 0, W, H);
      const glow2 = x.createRadialGradient(W * 0.9, H * 0.95, 0, W * 0.9, H * 0.95, W * 0.7);
      glow2.addColorStop(0, "rgba(255,181,223,.24)"); glow2.addColorStop(1, "rgba(255,181,223,0)");
      x.fillStyle = glow2; x.fillRect(0, 0, W, H);

      const base = baseZone();
      const startInstant = selectedInstant();
      const endInstant = selectedEndInstant();
      const baseStart = getParts(startInstant, base.timeZone);
      const baseEnd = getParts(endInstant, base.timeZone);
      const { durationSlots } = normalizedRange();

      const pad = 84;
      let y = 150;

      // Brand
      x.fillStyle = "rgba(255,255,255,.62)";
      x.font = "600 30px -apple-system, Inter, Segoe UI, sans-serif";
      x.textBaseline = "alphabetic";
      x.fillText("G L A S S   T I M E", pad, y);

      // Headline
      y += 110;
      x.fillStyle = "#ffffff";
      x.font = "800 116px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(durationText(durationSlots), pad, y);

      y += 70;
      x.fillStyle = "rgba(255,255,255,.82)";
      x.font = "600 44px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(`${base.label} · ${fmtDisplayTime(baseStart.hour, baseStart.minute)}–${fmtDisplayTime(baseEnd.hour, baseEnd.minute)}`, pad, y);

      y += 56;
      x.fillStyle = "rgba(255,255,255,.5)";
      x.font = "500 34px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText(new Intl.DateTimeFormat("es-ES", { weekday: "long", day: "numeric", month: "long", year: "numeric", timeZone: base.timeZone }).format(startInstant), pad, y);

      // City rows
      y += 96;
      const rowH = 132;
      const colors = COLORS;
      state.zones.forEach((zone, i) => {
        if (y + rowH > H - 130) return; // keep within the card
        roundRectPath(x, pad, y - 60, W - pad * 2, rowH - 24, 28);
        x.fillStyle = "rgba(255,255,255,.05)";
        x.fill();

        // color dot
        x.fillStyle = colors[i % colors.length];
        x.beginPath(); x.arc(pad + 44, y, 16, 0, Math.PI * 2); x.fill();

        const s = getParts(startInstant, zone.timeZone);
        const e = getParts(endInstant, zone.timeZone);

        x.fillStyle = "#ffffff";
        x.font = "700 42px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(zone.label, pad + 84, y + 4);

        x.fillStyle = "rgba(255,255,255,.55)";
        x.font = "500 28px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(zone.timeZone, pad + 84, y + 40);

        const range = `${fmtDisplayTime(s.hour, s.minute)}–${fmtDisplayTime(e.hour, e.minute)}`;
        x.fillStyle = "rgba(255,255,255,.92)";
        x.font = "700 42px -apple-system, Inter, Segoe UI, sans-serif";
        x.textAlign = "right";
        x.fillText(range, W - pad - 24, y + 4);
        x.fillStyle = "rgba(255,255,255,.5)";
        x.font = "500 28px -apple-system, Inter, Segoe UI, sans-serif";
        x.fillText(offsetText(startInstant, zone.timeZone), W - pad - 24, y + 40);
        x.textAlign = "left";

        y += rowH;
      });

      // Footer
      x.fillStyle = "rgba(255,255,255,.4)";
      x.font = "500 30px -apple-system, Inter, Segoe UI, sans-serif";
      x.fillText("peperonioo.github.io/glass-time-converter", pad, H - 70);

      return c;
    }

    async function shareSelection() {
      const url = buildShareURL();
      const canvas = buildShareCanvas();
      canvas.toBlob(async blob => {
        const file = blob && new File([blob], `glass-time-${state.dateISO}.png`, { type: "image/png" });
        if (file && navigator.canShare && navigator.canShare({ files: [file] })) {
          try {
            await navigator.share({
              files: [file],
              title: "Glass Time",
              text: `Hora seleccionada · ${baseZone().label}`,
              url
            });
            return;
          } catch { /* user cancelled or unsupported — fall through */ }
        }
        if (blob) {
          const a = document.createElement("a");
          a.href = URL.createObjectURL(blob);
          a.download = file.name;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(a.href);
        }
        navigator.clipboard?.writeText(url);
        showToast("Imagen guardada · link copiado");
      }, "image/png");
    }

    /* Glass Time — main (misc actions + wiring + bootstrap)
       Auto-split from the tested bundle. Edit here; run `node src/build.js` to regenerate dist. */
    /* ---------- misc actions ---------- */

    function jumpNow() {
      const base = baseZone();
      const p = getParts(new Date(), base.timeZone);
      state.dateISO = `${p.year}-${pad(p.month)}-${pad(p.day)}`;
      const currentSlot = p.hour * 2 + (p.minute >= 30 ? 1 : 0);
      state.selectedStartSlot = currentSlot;
      state.selectedEndSlot = clampSlot(currentSlot + 2);
      state.cursorSlot = currentSlot;
      render();

    }

    function reset() {
      localStorage.removeItem(STORAGE_KEY);
      load();
      render();
      focusHour();
      showToast("Reset hecho.");

      els.toast.textContent = message;
      els.toast.classList.add("show");
